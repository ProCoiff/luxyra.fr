<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luxyra — Nouveau mot de passe</title>
<link rel="icon" href="icon-192.png" type="image/png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0e;font-family:Helvetica,Arial,sans-serif;color:#e8e4dc;padding:20px}
.card{background:rgba(18,18,28,.95);border:2px solid rgba(212,168,67,.2);border-radius:20px;padding:36px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.logo{text-align:center;margin-bottom:28px}
.logo img{border-radius:14px;margin-bottom:10px}
.logo-text{font-size:24px;font-weight:700;color:#d4a843;font-family:Georgia,serif;letter-spacing:2px}
h2{font-size:20px;margin-bottom:8px;font-weight:700}
p{font-size:14px;color:#9a9590;line-height:1.6;margin-bottom:20px}
label{display:block;font-size:12px;color:#9a9590;font-weight:600;margin-bottom:5px}
input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#fff;font-size:15px;outline:none;margin-bottom:16px;transition:border .2s}
input:focus{border-color:#d4a843}
.btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#d4a843,#b8960f);color:#0a0a0a;font-weight:700;font-size:15px;border:none;cursor:pointer;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,168,67,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error{display:none;background:rgba(248,113,113,.12);color:#f87171;padding:10px;border-radius:10px;font-size:13px;margin-bottom:14px;text-align:center}
.success{display:none;text-align:center;padding:20px 0}
.success .check{font-size:48px;margin-bottom:12px}
.success h2{color:#4ade80;margin-bottom:8px}
.hint{font-size:11px;color:#5c5854;margin-top:-10px;margin-bottom:16px}
.footer{text-align:center;margin-top:20px;font-size:11px;color:#5c5854}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="icon-192.png" width="64" height="64" alt="Luxyra">
    <div class="logo-text">LUXYRA</div>
  </div>

  <div id="formView">
    <h2>Nouveau mot de passe</h2>
    <p>Choisissez votre nouveau mot de passe pour votre compte Luxyra.</p>
    <div class="error" id="error"></div>
    <label>Nouveau mot de passe</label>
    <input type="password" id="pw1" placeholder="Minimum 6 caractères">
    <label>Confirmer le mot de passe</label>
    <input type="password" id="pw2" placeholder="Retapez le mot de passe" onkeydown="if(event.key==='Enter')doReset()">
    <div class="hint">Minimum 6 caractères</div>
    <button class="btn" id="submitBtn" onclick="doReset()">Enregistrer le mot de passe</button>
  </div>

  <div class="success" id="successView">
    <div class="check">✅</div>
    <h2>Mot de passe modifié !</h2>
    <p>Votre mot de passe a été mis à jour avec succès. Vous pouvez maintenant vous connecter.</p>
    <a href="app.html" class="btn" style="display:block;text-align:center;text-decoration:none;margin-top:16px">Se connecter →</a>
  </div>

  <div class="footer">© 2026 Luxyra — contact@luxyra.fr</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var _sb = supabase.createClient(
  'https://kxdgjtvrkwugbifgppai.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4ZGdqdHZya3d1Z2JpZmdwcGFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDE2NTgsImV4cCI6MjA4ODYxNzY1OH0.J3jVuoHSWA0wXyaWxiRzILEWVNr8hbbgVYg73UEDTuI'
);

// Detect PASSWORD_RECOVERY event from Supabase redirect
_sb.auth.onAuthStateChange(function(event, session) {
  if (event === 'PASSWORD_RECOVERY') {
    // User clicked the reset link - show the form
    document.getElementById('formView').style.display = 'block';
  }
});

function showError(msg) {
  var el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function doReset() {
  var pw1 = document.getElementById('pw1').value;
  var pw2 = document.getElementById('pw2').value;
  document.getElementById('error').style.display = 'none';

  if (!pw1 || !pw2) { showError('Remplissez les deux champs'); return; }
  if (pw1.length < 6) { showError('Le mot de passe doit faire au moins 6 caractères'); return; }
  if (pw1 !== pw2) { showError('Les mots de passe ne correspondent pas'); return; }

  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Enregistrement...';

  var result = await _sb.auth.updateUser({ password: pw1 });

  if (result.error) {
    showError(result.error.message);
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Enregistrer le mot de passe';
    return;
  }

  document.getElementById('formView').style.display = 'none';
  document.getElementById('successView').style.display = 'block';
}
</script>
</body>
</html>
