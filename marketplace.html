<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeautyPro – Trouvez votre salon de beauté</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050508;--bg2:#0d0d14;--card:#12121c;--border:rgba(255,255,255,.06);
  --text:#f5f5f7;--text2:#a0a0b0;--text3:#606070;
  --gold:#c8a84e;--gold-bg:rgba(200,168,78,.08);--gold-border:rgba(200,168,78,.15);
  --pink:#e74c8b;--blue:#4ea8c8;--green:#4ec87a;--purple:#9b6dff;--orange:#ff8a50;
  --radius:14px;--f1:'DM Sans',sans-serif;--f2:'Playfair Display',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f1);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none}

/* HERO */
.hero{position:relative;padding:60px 20px 40px;text-align:center;overflow:hidden;background:linear-gradient(180deg,#0a0a14 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 50%,rgba(200,168,78,.06) 0%,transparent 50%);animation:pulse 8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
.hero-logo{font-family:var(--f2);font-size:32px;font-weight:900;color:var(--gold);margin-bottom:4px;letter-spacing:-1px}
.hero-sub{font-size:14px;color:var(--text3);margin-bottom:24px;letter-spacing:.5px}
.hero h1{font-family:var(--f2);font-size:clamp(28px,6vw,48px);font-weight:900;line-height:1.1;margin-bottom:8px}
.hero h1 span{color:var(--gold);font-style:italic}
.hero p{font-size:16px;color:var(--text2);max-width:500px;margin:0 auto 28px}

/* SEARCH */
.search-box{max-width:600px;margin:0 auto;position:relative}
.search-row{display:flex;gap:0;background:var(--card);border:1px solid var(--gold-border);border-radius:16px;overflow:hidden;box-shadow:0 0 40px rgba(200,168,78,.06)}
.search-row input{flex:1;padding:16px 20px;background:transparent;border:none;color:var(--text);font-size:15px;font-family:var(--f1);outline:none}
.search-row input::placeholder{color:var(--text3)}
.search-row .sep{width:1px;background:var(--border);margin:10px 0}
.search-btn{padding:16px 28px;background:var(--gold);color:#000;border:none;font-weight:800;font-size:14px;cursor:pointer;letter-spacing:.5px;font-family:var(--f1);transition:background .2s}
.search-btn:hover{background:#d4b45e}

/* CATEGORIES */
.cats{display:flex;gap:10px;justify-content:center;padding:20px;flex-wrap:wrap;max-width:700px;margin:0 auto}
.cat-pill{padding:10px 20px;border-radius:50px;border:1px solid var(--border);background:var(--bg2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.cat-pill:hover,.cat-pill.active{border-color:var(--gold);background:var(--gold-bg);color:var(--gold)}
.cat-pill .ci{font-size:18px}

/* RESULTS */
.results{max-width:900px;margin:0 auto;padding:0 16px 40px}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:0 4px}
.results-header h2{font-size:18px;font-weight:700}
.results-header span{font-size:13px;color:var(--text3)}
.salon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

/* SALON CARD */
.salon-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .25s}
.salon-card:hover{border-color:var(--gold-border);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.salon-img{height:160px;background-size:cover;background-position:center;position:relative}
.salon-img .badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.salon-img .badge.online{background:rgba(78,200,122,.2);color:#4ec87a;backdrop-filter:blur(8px)}
.salon-img .badge.new{background:rgba(155,109,255,.2);color:#9b6dff;backdrop-filter:blur(8px)}
.salon-body{padding:14px}
.salon-name{font-size:16px;font-weight:800;margin-bottom:4px}
.salon-type{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.salon-addr{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.salon-rating{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.stars{color:var(--gold);font-size:14px;letter-spacing:1px}
.rating-num{font-size:14px;font-weight:800}
.rating-count{font-size:11px;color:var(--text3)}
.salon-tags{display:flex;gap:4px;flex-wrap:wrap}
.salon-tags span{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(255,255,255,.04);color:var(--text2)}
.salon-tags span.top{background:var(--gold-bg);color:var(--gold)}
.salon-cta{display:block;text-align:center;padding:10px;margin-top:10px;background:var(--gold);color:#000;border-radius:10px;font-weight:800;font-size:13px;transition:all .2s}
.salon-cta:hover{background:#d4b45e}

/* SALON DETAIL */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.detail-sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:0;animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-hero{height:200px;background-size:cover;background-position:center;position:relative}
.detail-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.detail-body{padding:20px}
.detail-body h2{font-size:22px;font-weight:900;margin-bottom:4px}

/* REVIEWS */
.review{padding:12px 0;border-bottom:1px solid var(--border)}
.review-head{display:flex;justify-content:space-between;margin-bottom:4px}
.review-name{font-weight:700;font-size:13px}
.review-date{font-size:11px;color:var(--text3)}
.review-stars{color:var(--gold);font-size:12px;margin-bottom:4px}
.review-text{font-size:13px;color:var(--text2);line-height:1.5}

/* FOOTER */
.footer{padding:40px 20px;text-align:center;border-top:1px solid var(--border);margin-top:40px}
.footer-logo{font-family:var(--f2);font-size:20px;font-weight:900;color:var(--gold);margin-bottom:8px}
.footer p{font-size:12px;color:var(--text3);max-width:400px;margin:0 auto}

@media(max-width:600px){
  .search-row{flex-direction:column}
  .search-row .sep{width:auto;height:1px;margin:0 16px}
  .salon-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// Supabase
var SB_URL="https://kxdgjtvrkwugbifgppai.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4ZGdqdHZya3d1Z2JpZmdwcGFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIzNjMxNzAsImV4cCI6MjA1NzkzOTE3MH0.d4lMKOasHYxsJvJCrWKG_e2PvJqeAp0cXCOsSQMHHSI";

var SALONS=[];
var REVIEWS={};
var FILTER={q:"",city:"",type:"all"};

var TYPES=[
  {k:"all",l:"Tous",ico:"✨"},
  {k:"coiffure",l:"Coiffure",ico:"✂️"},
  {k:"barbier",l:"Barbier",ico:"💈"},
  {k:"esthetique",l:"Esthétique",ico:"💆"},
  {k:"ongles",l:"Ongles",ico:"💅"},
  {k:"bien_etre",l:"Bien-être",ico:"🧘"}
];

async function loadSalons(){
  try{
    var resp=await fetch(SB_URL+"/rest/v1/salons_public?select=id,nom,metier,config_json,note_moyenne,nb_avis&apikey="+SB_KEY,{headers:{"apikey":SB_KEY}});
    if(!resp.ok)throw new Error(resp.status);
    var data=await resp.json();
    SALONS=data.map(function(s){
      var cfg={};try{cfg=typeof s.config_json==="string"?JSON.parse(s.config_json):s.config_json||{};}catch(e){}
      return{
        id:s.id,
        nom:cfg.nom||s.nom||"Salon",
        type:s.metier||cfg.metier||"coiffure",
        adresse:cfg.adresse||"",
        cp:cfg.cp||"",
        ville:cfg.ville||"",
        tel:cfg.tel||"",
        photo:cfg.photoSalon||cfg.photoHero||"",
        logo:cfg.logo||"",
        slogan:cfg.slogan||"",
        note:s.note_moyenne||0,
        nbAvis:s.nb_avis||0,
        online:cfg.siteActif||false,
        tags:cfg.tags||[],
        siteId:s.id
      };
    });
  }catch(e){
    console.warn("API indisponible, chargement des salons de d\u00e9mo");
    SALONS=getDemoSalons();
  }
  render();
}

    {id:"demo1",nom:"Excellence Coiffure",type:"coiffure",adresse:"20 rue Nationale",cp:"57200",ville:"Sarreguemines",tel:"03 87 XX XX XX",photo:"",logo:"",slogan:"Votre salon de coiffure \u00e0 Sarreguemines",note:4.8,nbAvis:42,online:true,tags:["Coloration","Balayage","Coupe homme"],prestations:[],horaires:null,siteId:"demo1"},
    {id:"demo2",nom:"Barber Street",type:"barbier",adresse:"15 rue de France",cp:"57200",ville:"Sarreguemines",tel:"",photo:"",logo:"",slogan:"Le barbier au style urbain",note:4.6,nbAvis:28,online:true,tags:["Barbe","D\u00e9grad\u00e9","Rasage"],prestations:[],horaires:null,siteId:"demo2"},
    {id:"demo3",nom:"Institut Zen",type:"esthetique",adresse:"8 place du March\u00e9",cp:"57200",ville:"Sarreguemines",tel:"",photo:"",logo:"",slogan:"Soins du visage et du corps",note:4.9,nbAvis:63,online:true,tags:["Soin visage","\u00c9pilation","Maquillage"],prestations:[],horaires:null,siteId:"demo3"},
    {id:"demo4",nom:"Nail Art Studio",type:"ongles",adresse:"5 rue des Vosges",cp:"57200",ville:"Sarreguemines",tel:"",photo:"",logo:"",slogan:"Manucure, p\u00e9dicure, nail art",note:4.7,nbAvis:35,online:false,tags:["Gel","Semi-permanent","Nail art"],prestations:[],horaires:null,siteId:"demo4"},
    {id:"demo5",nom:"Bulle de S\u00e9r\u00e9nit\u00e9",type:"bien_etre",adresse:"12 avenue de la Gare",cp:"57200",ville:"Sarreguemines",tel:"",photo:"",logo:"",slogan:"Massages et relaxation",note:4.9,nbAvis:51,online:true,tags:["Massage","Relaxation","Shiatsu"],prestations:[],horaires:null,siteId:"demo5"},
    {id:"demo6",nom:"L\u0027Atelier Coiffure",type:"coiffure",adresse:"3 rue de Bitche",cp:"57230",ville:"Bitche",tel:"",photo:"",logo:"",slogan:"Cr\u00e9ativit\u00e9 et tendances",note:4.5,nbAvis:19,online:true,tags:["M\u00e8ches","Lissage","Coupe femme"],prestations:[],horaires:null,siteId:"demo6"}
  ];
}

function render(){
  var h='';
  // Hero
  h+='<div class="hero">';
  h+='<div class="hero-logo"><svg width="32" height="32" viewBox="0 0 32 32" style="vertical-align:middle;margin-right:6px"><circle cx="16" cy="16" r="15" fill="none" stroke="#c8a84e" stroke-width="1.5"/><text x="16" y="21" text-anchor="middle" font-family="Playfair Display,serif" font-size="18" font-weight="900" fill="#c8a84e">B</text></svg>BeautyPro</div>';
  h+='<div class="hero-sub">COIFFURE \u2022 BARBIER \u2022 ESTH\u00c9TIQUE \u2022 ONGLES \u2022 BIEN-\u00caTRE</div>';
  h+='<h1>Trouvez votre <span>salon</span><br>en quelques clics</h1>';
  h+='<p>Coiffure, barbier, esth\u00e9tique, ongles, bien-\u00eatre... R\u00e9servez en ligne, consultez les avis.</p>';
  
  // Search
  h+='<div class="search-box">';
  h+='<div class="search-row">';
  h+='<input id="sQ" placeholder="\ud83d\udd0d Salon, prestation..." value="'+FILTER.q+'" oninput="FILTER.q=this.value">';
  h+='<div class="sep"></div>';
  h+='<input id="sCity" placeholder="\ud83d\udccd Ville" value="'+FILTER.city+'" oninput="FILTER.city=this.value">';
  h+='<button class="search-btn" onclick="render()">Rechercher</button>';
  h+='</div></div>';
  h+='</div>';
  
  // Categories
  h+='<div class="cats">';
  for(var i=0;i<TYPES.length;i++){
    var t=TYPES[i];
    h+='<div class="cat-pill'+(FILTER.type===t.k?" active":"")+'" onclick="FILTER.type=\''+t.k+'\';render()">';
    h+='<span class="ci">'+t.ico+'</span>'+t.l+'</div>';
  }
  h+='</div>';
  
  // Filter salons
  var filtered=SALONS.filter(function(s){
    if(FILTER.type!=="all"&&s.type!==FILTER.type)return false;
    if(FILTER.city){var c=FILTER.city.toLowerCase();if(s.ville.toLowerCase().indexOf(c)<0&&s.cp.indexOf(c)<0)return false;}
    if(FILTER.q){var q=FILTER.q.toLowerCase();if(s.nom.toLowerCase().indexOf(q)<0&&s.slogan.toLowerCase().indexOf(q)<0)return false;}
    return true;
  });
  
  // Results
  h+='<div class="results">';
  h+='<div class="results-header"><h2>'+filtered.length+' \u00e9tablissement'+(filtered.length>1?"s":"")+'</h2>';
  h+='<span>Tri\u00e9s par pertinence</span></div>';
  h+='<div class="salon-grid">';
  
  for(var si=0;si<filtered.length;si++){
    var s=filtered[si];
    var stars=genStars(s.note||4.5);
    var typeLabel=TYPES.find(function(t){return t.k===s.type;})||TYPES[0];
    var defaultImgs={
      coiffure:"https://images.unsplash.com/photo-1560066984-138dadb4c035?w=600&h=300&fit=crop",
      barbier:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=600&h=300&fit=crop",
      esthetique:"https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=600&h=300&fit=crop",
      ongles:"https://images.unsplash.com/photo-1604654894610-df63bc536371?w=600&h=300&fit=crop",
      bien_etre:"https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=600&h=300&fit=crop"
    };
    var img=s.photo||(defaultImgs[s.type]||defaultImgs.coiffure);
    
    h+='<div class="salon-card" onclick="openSalon(\''+s.id+'\')">';
    h+='<div class="salon-img" style="background-image:url('+img+')">';
    if(s.online)h+='<div class="badge online">\ud83c\udf10 R\u00e9servation en ligne</div>';
    h+='</div>';
    h+='<div class="salon-body">';
    h+='<div class="salon-type">'+typeLabel.ico+' '+typeLabel.l+'</div>';
    h+='<div class="salon-name">'+s.nom+'</div>';
    h+='<div class="salon-addr">\ud83d\udccd '+s.adresse+' '+s.cp+' '+s.ville+'</div>';
    h+='<div class="salon-rating">'+stars+' <span class="rating-num">'+(s.note||4.5).toFixed(1)+'</span><span class="rating-count">('+(s.nbAvis||0)+' avis)</span></div>';
    if(s.tags.length){
      h+='<div class="salon-tags">';
      for(var ti=0;ti<Math.min(s.tags.length,3);ti++)h+='<span'+(ti===0?' class="top"':'')+'>'+s.tags[ti]+'</span>';
      h+='</div>';
    }
    if(s.online)h+='<div class="salon-cta">R\u00e9server en ligne</div>';
    h+='</div></div>';
  }
  
  if(!filtered.length){
    h+='<div style="grid-column:1/-1;text-align:center;padding:60px 20px">';
    h+='<div style="font-size:48px;margin-bottom:12px">\ud83d\udd0d</div>';
    h+='<div style="font-size:18px;font-weight:700;margin-bottom:6px">Aucun \u00e9tablissement trouv\u00e9</div>';
    h+='<div style="color:var(--text3)">Essayez une autre ville ou cat\u00e9gorie</div></div>';
  }
  
  h+='</div></div>';
  
  // Footer
  h+='<div class="footer">';
  h+='<div class="footer-logo"><svg width="24" height="24" viewBox="0 0 32 32" style="vertical-align:middle;margin-right:4px"><circle cx="16" cy="16" r="15" fill="none" stroke="#c8a84e" stroke-width="1.5"/><text x="16" y="21" text-anchor="middle" font-family="Playfair Display,serif" font-size="18" font-weight="900" fill="#c8a84e">B</text></svg>BeautyPro</div>';
  h+='<p>La plateforme de r\u00e9servation beaut\u00e9 pour les professionnels et leurs clients. Coiffure, barbier, esth\u00e9tique, ongles et bien-\u00eatre.</p>';
  h+='<p style="margin-top:12px"><a href="#">Vous \u00eates professionnel ?</a> \u2022 <a href="#">CGU</a> \u2022 <a href="#">Contact</a></p>';
  h+='</div>';
  
  document.getElementById("app").innerHTML=h;
}

function genStars(n){
  var full=Math.floor(n);var half=n-full>=0.5;
  var h='<span class="stars">';
  for(var i=0;i<full;i++)h+='★';
  if(half)h+='★';
  for(var i=full+(half?1:0);i<5;i++)h+='☆';
  h+='</span>';
  return h;
}

function openSalon(id){
  var s=SALONS.find(function(x){return x.id===id;});if(!s)return;
  var typeLabel=TYPES.find(function(t){return t.k===s.type;})||TYPES[0];
  var defaultImgs2={coiffure:"https://images.unsplash.com/photo-1560066984-138dadb4c035?w=600&h=300&fit=crop",barbier:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=600&h=300&fit=crop",esthetique:"https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=600&h=300&fit=crop",ongles:"https://images.unsplash.com/photo-1604654894610-df63bc536371?w=600&h=300&fit=crop",bien_etre:"https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=600&h=300&fit=crop"};
  var img=s.photo||(defaultImgs2[s.type]||defaultImgs2.coiffure);
  var stars=genStars(s.note||4.5);
  
  var h='<div class="detail-overlay" onclick="closeDetail()">';
  h+='<div class="detail-sheet" onclick="event.stopPropagation()">';
  h+='<div class="detail-hero" style="background-image:url('+img+')">';
  h+='<button class="detail-close" onclick="closeDetail()">\u2715</button></div>';
  h+='<div class="detail-body">';
  h+='<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">'+typeLabel.ico+' '+typeLabel.l+'</div>';
  h+='<h2>'+s.nom+'</h2>';
  if(s.slogan)h+='<div style="font-size:14px;color:var(--text2);font-style:italic;margin-bottom:8px">'+s.slogan+'</div>';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'+stars+' <strong>'+(s.note||4.5).toFixed(1)+'</strong><span style="color:var(--text3);font-size:12px">'+(s.nbAvis||0)+' avis</span></div>';
  
  // Info
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';
  h+='<div style="padding:10px;background:rgba(255,255,255,.03);border-radius:10px"><div style="font-size:10px;color:var(--text3)">Adresse</div><div style="font-size:13px;font-weight:600">\ud83d\udccd '+s.adresse+'<br>'+s.cp+' '+s.ville+'</div></div>';
  h+='<div style="padding:10px;background:rgba(255,255,255,.03);border-radius:10px"><div style="font-size:10px;color:var(--text3)">T\u00e9l\u00e9phone</div><div style="font-size:13px;font-weight:600">\ud83d\udcde '+(s.tel||"Non renseign\u00e9")+'</div></div>';
  h+='</div>';
  
  // CTA
  if(s.online){
    h+='<a href="site.html?s='+s.siteId+'" target="_blank" style="display:block;text-align:center;padding:14px;background:var(--gold);color:#000;border-radius:12px;font-weight:800;font-size:15px;margin-bottom:16px">R\u00e9server en ligne \u2192</a>';
  }
  
  // Reviews section
  h+='<div style="margin-top:16px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3 style="font-size:16px">Avis clients</h3>';
  h+='<button onclick="showReviewForm(\''+s.id+'\')" style="padding:8px 14px;border-radius:8px;border:1px solid var(--gold-border);background:var(--gold-bg);color:var(--gold);font-weight:700;font-size:12px;cursor:pointer">Laisser un avis</button></div>';
  
  var rev=REVIEWS[s.id]||[];
  if(rev.length){
    for(var ri=0;ri<rev.length;ri++){
      var r=rev[ri];
      h+='<div class="review">';
      h+='<div class="review-head"><span class="review-name">'+r.nom+'</span><span class="review-date">'+r.date+'</span></div>';
      h+='<div class="review-stars">'+genStars(r.note)+'</div>';
      h+='<div class="review-text">'+r.texte+'</div></div>';
    }
  } else {
    h+='<div style="text-align:center;padding:20px;color:var(--text3);font-size:13px">Aucun avis pour le moment. Soyez le premier !</div>';
  }
  h+='</div>';
  
  // Review form placeholder
  h+='<div id="reviewForm"></div>';
  
  h+='</div></div></div>';
  
  var overlay=document.createElement("div");
  overlay.id="detailOverlay";
  overlay.innerHTML=h;
  document.body.appendChild(overlay);
}

function closeDetail(){
  var el=document.getElementById("detailOverlay");
  if(el)el.remove();
}

function showReviewForm(salonId){
  var el=document.getElementById("reviewForm");if(!el)return;
  var h='<div style="margin-top:16px;padding:16px;background:rgba(255,255,255,.03);border-radius:12px;border:1px solid var(--border)">';
  h+='<h4 style="margin-bottom:10px">\u270d\ufe0f Donner votre avis</h4>';
  h+='<div style="margin-bottom:8px"><label style="font-size:12px;font-weight:600;color:var(--text3)">Votre nom</label><input id="rvName" style="width:100%;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px" placeholder="Pr\u00e9nom"></div>';
  h+='<div style="margin-bottom:8px"><label style="font-size:12px;font-weight:600;color:var(--text3)">Note</label><div style="display:flex;gap:6px;font-size:28px;cursor:pointer" id="rvStars">';
  for(var i=1;i<=5;i++)h+='<span onclick="setReviewStar('+i+')" data-star="'+i+'" style="color:var(--text3);transition:color .15s">\u2606</span>';
  h+='</div></div>';
  h+='<div style="margin-bottom:8px"><label style="font-size:12px;font-weight:600;color:var(--text3)">Votre avis</label><textarea id="rvText" rows="3" style="width:100%;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;resize:vertical" placeholder="Partagez votre exp\u00e9rience..."></textarea></div>';
  h+='<button onclick="submitReview(\''+salonId+'\')" style="width:100%;padding:12px;background:var(--gold);color:#000;border:none;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer">Publier mon avis</button>';
  h+='</div>';
  el.innerHTML=h;
  window._rvNote=0;
}

function setReviewStar(n){
  window._rvNote=n;
  var spans=document.querySelectorAll("#rvStars span");
  spans.forEach(function(sp){
    var s=parseInt(sp.dataset.star);
    sp.textContent=s<=n?"★":"☆";
    sp.style.color=s<=n?"var(--gold)":"var(--text3)";
  });
}

async function submitReview(salonId){
  var name=document.getElementById("rvName")?document.getElementById("rvName").value.trim():"";
  var text=document.getElementById("rvText")?document.getElementById("rvText").value.trim():"";
  var note=window._rvNote||0;
  if(!name||!text||!note){alert("Remplissez tous les champs et donnez une note");return;}
  
  // Save to Supabase
  try{
    await fetch(SB_URL+"/rest/v1/avis_salon",{
      method:"POST",
      headers:{"apikey":SB_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify({salon_id:salonId,nom:name,note:note,texte:text,date:new Date().toISOString().slice(0,10)})
    });
  }catch(e){console.error(e);}
  
  if(!REVIEWS[salonId])REVIEWS[salonId]=[];
  REVIEWS[salonId].unshift({nom:name,note:note,texte:text,date:new Date().toLocaleDateString("fr-FR")});
  
  // Update salon rating
  var s=SALONS.find(function(x){return x.id===salonId;});
  if(s){
    s.nbAvis=(s.nbAvis||0)+1;
    var sum=note;REVIEWS[salonId].forEach(function(r){sum+=r.note;});
    s.note=Math.round(sum/REVIEWS[salonId].length*10)/10;
  }
  
  closeDetail();
  openSalon(salonId);
}

async function loadReviews(){
  try{
    var resp=await fetch(SB_URL+"/rest/v1/avis_salon?select=salon_id,nom,note,texte,date&order=date.desc&limit=200&apikey="+SB_KEY,{headers:{"apikey":SB_KEY}});
    if(!resp.ok)throw new Error(resp.status);
    var data=await resp.json();
    if(Array.isArray(data)){
      data.forEach(function(r){
        if(!REVIEWS[r.salon_id])REVIEWS[r.salon_id]=[];
        REVIEWS[r.salon_id].push({nom:r.nom,note:r.note,texte:r.texte,date:r.date});
      });
    }
  }catch(e){
    // Demo reviews
    REVIEWS["demo1"]=[
      {nom:"Sophie M.",note:5,texte:"Salon au top ! Amandine est tr\u00e8s professionnelle, ma couleur est parfaite.",date:"15/03/2026"},
      {nom:"Marc D.",note:5,texte:"Coupe homme impeccable. Accueil chaleureux, je recommande.",date:"10/03/2026"},
      {nom:"Julie R.",note:4,texte:"Tr\u00e8s bon salon, un peu d\u0027attente mais le r\u00e9sultat en vaut la peine !",date:"02/03/2026"}
    ];
    REVIEWS["demo3"]=[
      {nom:"Laura B.",note:5,texte:"Soin visage extraordinaire, ma peau est transform\u00e9e. Merci !",date:"18/03/2026"},
      {nom:"Claire F.",note:5,texte:"Cadre zen et apaisant, \u00e9pilation parfaite comme toujours.",date:"12/03/2026"}
    ];
  }
  render();
}

// Init
loadSalons();
loadReviews();
</script>
</body>
</html>
