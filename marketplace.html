<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxyra – Trouvez votre professionnel de beauté</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050508;--bg2:#0d0d14;--card:#12121c;--border:rgba(255,255,255,.06);
  --text:#f5f5f7;--text2:#a0a0b0;--text3:#606070;
  --gold:#c8a84e;--gold-bg:rgba(200,168,78,.08);--gold-border:rgba(200,168,78,.15);
  --pink:#e74c8b;--blue:#4ea8c8;--green:#4ec87a;--purple:#9b6dff;--orange:#ff8a50;
  --radius:14px;--f1:'DM Sans',sans-serif;--f2:'Playfair Display',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f1);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none}

/* HERO */
.hero{position:relative;padding:28px 20px 24px;text-align:center;overflow:hidden;background:linear-gradient(180deg,#0a0a14 0%,var(--bg) 100%)}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 50%,rgba(200,168,78,.06) 0%,transparent 50%);animation:pulse 8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
.hero-logo{font-family:var(--f2);font-size:32px;font-weight:900;color:var(--gold);margin-bottom:2px;letter-spacing:-1px;display:flex;justify-content:center}
.hero-sub{font-size:13px;color:var(--text3);margin-bottom:12px;letter-spacing:.5px}
.hero h1{font-family:var(--f2);font-size:clamp(24px,5.5vw,42px);font-weight:900;line-height:1.1;margin-bottom:6px}
.hero h1 span{color:var(--gold);font-style:italic}
.hero p{font-size:15px;color:var(--text2);max-width:500px;margin:0 auto 16px}

/* SEARCH */
.search-box{max-width:600px;margin:0 auto;position:relative}
.search-row{display:flex;gap:0;background:var(--card);border:1px solid var(--gold-border);border-radius:16px;overflow:hidden;box-shadow:0 0 40px rgba(200,168,78,.06)}
.search-row input{flex:1;padding:16px 20px;background:transparent;border:none;color:var(--text);font-size:15px;font-family:var(--f1);outline:none}
.search-row input::placeholder{color:var(--text3)}
.search-row .sep{width:1px;background:var(--border);margin:10px 0}
.search-btn{padding:16px 28px;background:var(--gold);color:#000;border:none;font-weight:800;font-size:14px;cursor:pointer;letter-spacing:.5px;font-family:var(--f1);transition:background .2s}
.search-btn:hover{background:#d4b45e}

/* CATEGORIES */
.cats{display:flex;gap:8px;justify-content:center;padding:10px 20px;flex-wrap:wrap;max-width:700px;margin:0 auto}
.cat-pill{padding:10px 20px;border-radius:50px;border:1px solid var(--border);background:var(--bg2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.cat-pill:hover,.cat-pill.active{border-color:var(--gold);background:var(--gold-bg);color:var(--gold)}
.cat-pill .ci{font-size:18px}

/* RESULTS */
.results{max-width:900px;margin:0 auto;padding:0 16px 40px}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:0 4px}
.results-header h2{font-size:18px;font-weight:700}
.results-header span{font-size:13px;color:var(--text3)}
.salon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}

/* SALON CARD */
.salon-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .25s}
.salon-card:hover{border-color:var(--gold-border);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.salon-img{height:160px;background-size:cover;background-position:center;position:relative}
.salon-img .badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.salon-img .badge.online{background:rgba(78,200,122,.2);color:#4ec87a;backdrop-filter:blur(8px)}
.salon-img .badge.domicile{background:rgba(96,165,250,.2);color:#60a5fa;backdrop-filter:blur(8px)}
.salon-img .badge.new{background:rgba(155,109,255,.2);color:#9b6dff;backdrop-filter:blur(8px)}
.salon-body{padding:14px}
.salon-name{font-size:16px;font-weight:800;margin-bottom:4px}
.salon-type{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.salon-addr{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.salon-rating{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.stars{color:var(--gold);font-size:14px;letter-spacing:1px}
.rating-num{font-size:14px;font-weight:800}
.rating-count{font-size:11px;color:var(--text3)}
.salon-tags{display:flex;gap:4px;flex-wrap:wrap}
.salon-tags span{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(255,255,255,.04);color:var(--text2)}
.salon-tags span.top{background:var(--gold-bg);color:var(--gold)}
.salon-cta{display:block;text-align:center;padding:10px;margin-top:10px;background:var(--gold);color:#000;border-radius:10px;font-weight:800;font-size:13px;transition:all .2s}
.salon-cta:hover{background:#d4b45e}

/* SALON DETAIL */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.detail-sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:0;animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-hero{height:200px;background-size:cover;background-position:center;position:relative}
.detail-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.detail-body{padding:20px}
.detail-body h2{font-size:22px;font-weight:900;margin-bottom:4px}

/* REVIEWS */
.review{padding:12px 0;border-bottom:1px solid var(--border)}
.review-head{display:flex;justify-content:space-between;margin-bottom:4px}
.review-name{font-weight:700;font-size:13px}
.review-date{font-size:11px;color:var(--text3)}
.review-stars{color:var(--gold);font-size:12px;margin-bottom:4px}
.review-text{font-size:13px;color:var(--text2);line-height:1.5}

/* FOOTER */
.footer{padding:40px 20px;text-align:center;border-top:1px solid var(--border);margin-top:40px}
.footer-logo{font-family:var(--f2);font-size:20px;font-weight:900;color:var(--gold);margin-bottom:8px}
.footer p{font-size:12px;color:var(--text3);max-width:400px;margin:0 auto}

@media(max-width:600px){
  .search-row{flex-direction:column}
  .search-row .sep{width:auto;height:1px;margin:0 16px}
  .salon-grid{grid-template-columns:1fr}
}
</style>

async function hashPasswordMkt(pass){
  var enc=new TextEncoder().encode(pass);
  var hash=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

function genStars(n){
  var full=Math.floor(n);var half=n-full>=0.5;
  var h='<span class="stars">';
  for(var i=0;i<full;i++)h+='★';
  if(half)h+='★';
  for(var i=full+(half?1:0);i<5;i++)h+='☆';
  h+='</span>';
  return h;
}

async function openSalon(id){
  var s=SALONS.find(function(x){return x.id===id;});if(!s)return;
  // Show loading
  var loadEl=document.createElement("div");loadEl.id="detailOverlay";
  loadEl.innerHTML='<div class="detail-overlay" onclick="closeDetail()"><div class="detail-sheet" onclick="event.stopPropagation()" style="display:flex;align-items:center;justify-content:center;min-height:300px"><div style="text-align:center;color:var(--text3)"><div style="font-size:36px;margin-bottom:8px">\u23f3</div>Chargement de '+s.nom+'...</div></div></div>';
  document.body.appendChild(loadEl);
  // Load real services + collabs
  var services=[],collabs=[];
  try{
    var sR=await fetch(SB_URL+"/rest/v1/services?select=nom,prix,categorie,phases,show_site,book_online&salon_id=eq."+id+"&show_site=eq.true&order=categorie,nom",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
    if(sR.ok){var sd=await sR.json();if(Array.isArray(sd))services=sd;}
  }catch(e){}
  try{
    var cR=await fetch(SB_URL+"/rest/v1/collaborateurs?select=nom,initiales,couleur,horaires&salon_id=eq."+id+"&order=nom",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
    if(cR.ok){var cd=await cR.json();if(Array.isArray(cd))collabs=cd;}
  }catch(e){}
  // Remove loading, show real detail

function setReviewStar(n){
  window._rvNote=n;
  var spans=document.querySelectorAll("#rvStars span");
  spans.forEach(function(sp){
    var s=parseInt(sp.dataset.star);
    sp.textContent=s<=n?"★":"☆";
    sp.style.color=s<=n?"var(--gold)":"var(--text3)";
  });
}

async function submitReview(salonId){
  var name=document.getElementById("rvName")?document.getElementById("rvName").value.trim():"";
  var text=document.getElementById("rvText")?document.getElementById("rvText").value.trim():"";
  var note=window._rvNote||0;
  if(!name||!text||!note){alert("Remplissez tous les champs et donnez une note");return;}
  
  // Save to Supabase
  try{
    await fetch(SB_URL+"/rest/v1/avis_salon",{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=minimal"},
      body:JSON.stringify({salon_id:salonId,nom:name,note:note,texte:text,date:new Date().toISOString().slice(0,10)})
    });
  }catch(e){console.error(e);}
  
  if(!REVIEWS[salonId])REVIEWS[salonId]=[];
  REVIEWS[salonId].unshift({nom:name,note:note,texte:text,date:new Date().toLocaleDateString("fr-FR")});
  
  // Update salon rating
  var s=SALONS.find(function(x){return x.id===salonId;});
  if(s){
    s.nbAvis=(s.nbAvis||0)+1;
    var sum=note;REVIEWS[salonId].forEach(function(r){sum+=r.note;});
    s.note=Math.round(sum/REVIEWS[salonId].length*10)/10;
  }
  
  closeDetail();
  openSalon(salonId);
}

async function doMktRegister(){
  var nom=document.getElementById("mktNom").value.trim();
  var pre=document.getElementById("mktPre")?document.getElementById("mktPre").value.trim():"";
  var tel=document.getElementById("mktTel").value.trim();
  var ddn=document.getElementById("mktDdn")?document.getElementById("mktDdn").value:"";
  var email=document.getElementById("mktEmail").value.trim().toLowerCase();
  var pass=document.getElementById("mktPass").value;
  var pass2=document.getElementById("mktPass2").value;
  if(!nom||!tel||!email||!pass){showMktAuthErr("Remplissez tous les champs obligatoires");return;}
  if(pass.length<6){showMktAuthErr("Mot de passe : 6 caract\u00e8res minimum");return;}
  if(pass!==pass2){showMktAuthErr("Les mots de passe ne correspondent pas");return;}
  var smsOk=document.getElementById("mktSms")?document.getElementById("mktSms").checked:false;
  var emOk=document.getElementById("mktEm")?document.getElementById("mktEm").checked:false;
  var hash=await hashPasswordMkt(pass);
  try{
    var check=await fetch(SB_URL+"/rest/v1/clients_beautypro?select=id&email=eq."+encodeURIComponent(email),{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
    var existing=await check.json();
    if(existing&&existing.length>0){showMktAuthErr("Un compte existe d\u00e9j\u00e0 avec cet email. Connectez-vous.");return;}
    var r=await fetch(SB_URL+"/rest/v1/clients_beautypro",{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"},body:JSON.stringify({email:email,password_hash:hash,nom:nom,prenom:pre,telephone:tel,date_naissance:ddn||null,sms_ok:smsOk,email_ok:emOk,email_verified:false})});
    var data=await r.json();
    if(data&&data.length>0){MKT_CLIENT=data[0];saveMktSession();closeMktAuth();render();}
    else if(data&&data.id){MKT_CLIENT=data;saveMktSession();closeMktAuth();render();}
    else{showMktAuthErr("Erreur lors de la cr\u00e9ation du compte");}
  }catch(e){showMktAuthErr("Erreur r\u00e9seau: "+e.message);}
}

async function doMktLogin(){
  var email=document.getElementById("mktEmail").value.trim().toLowerCase();
  var pass=document.getElementById("mktPass").value;
  if(!email||!pass){showMktAuthErr("Remplissez email et mot de passe");return;}
  var hash=await hashPasswordMkt(pass);
  try{
    var r=await fetch(SB_URL+"/rest/v1/clients_beautypro?select=*&email=eq."+encodeURIComponent(email),{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
    var data=await r.json();
    if(!Array.isArray(data)||data.length===0){showMktAuthErr("Email ou mot de passe incorrect");return;}
    var user=data[0];
    if(user.password_hash!==hash){showMktAuthErr("Email ou mot de passe incorrect");return;}
    MKT_CLIENT=user;
    fetch(SB_URL+"/rest/v1/clients_beautypro?id=eq."+MKT_CLIENT.id,{method:"PATCH",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"},body:JSON.stringify({last_login:new Date().toISOString()})});
    saveMktSession();closeMktAuth();render();
  }catch(e){showMktAuthErr("Erreur r\u00e9seau: "+e.message);}
}

  h+='<div class="detail-sheet" onclick="event.stopPropagation()" style="max-width:500px;border-radius:20px;margin:auto">';
  h+='<div style="padding:24px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="font-size:20px">\ud83d\udcc5 Mes rendez-vous</h2><button onclick="closeMyRdvs()" style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer">\u2715</button></div>';
  h+='<div id="myRdvContent" style="text-align:center;padding:20px;color:var(--text3)">Chargement...</div>';
  h+='</div></div></div>';
  var el=document.createElement("div");el.id="myRdvsOverlay";el.innerHTML=h;
  document.body.appendChild(el);
  // Load all RDVs for this client across all salons
  try{
    var r=await fetch(SB_URL+"/rest/v1/rdv_online?select=*,salons(nom,ville,config_json)&client_beautypro_id=eq."+MKT_CLIENT.id+"&order=date_rdv.desc&limit=20",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
    var rdvs=await r.json();
    // Fallback: also by email
    var r2=await fetch(SB_URL+"/rest/v1/rdv_online?select=*,salons(nom,ville,config_json)&client_email=eq."+encodeURIComponent(MKT_CLIENT.email)+"&order=date_rdv.desc&limit=20",{headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});
    var rdvs2=await r2.json();
    if(Array.isArray(rdvs2)){rdvs2.forEach(function(r){var ex=false;if(Array.isArray(rdvs)){rdvs.forEach(function(x){if(x.id===r.id)ex=true;});}if(!ex&&Array.isArray(rdvs))rdvs.push(r);});}
    renderMyRdvs(Array.isArray(rdvs)?rdvs:[]);
  }catch(e){
    var el2=document.getElementById("myRdvContent");
    if(el2)el2.innerHTML='<div style="color:#f87171">Erreur de chargement</div>';
  }
}
function closeMyRdvs(){var el=document.getElementById("myRdvsOverlay");if(el)el.remove();}

function renderMyRdvs(rdvs){
  var el=document.getElementById("myRdvContent");if(!el)return;
  if(!rdvs.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--text3)">Aucun rendez-vous pour le moment</div>';return;}
  var mois=["Jan","F\u00e9v","Mar","Avr","Mai","Jun","Jul","Ao\u00fb","Sep","Oct","Nov","D\u00e9c"];
  var h='';
  rdvs.forEach(function(r){
    var dp=r.date_rdv?r.date_rdv.split("-"):["","",""];
    var salonNom=r.salons?r.salons.nom:"Salon";
    var stColors={pending:"#fb923c",confirmed:"#4ade80",done:"#60a5fa",cancelled:"#f87171"};
    var stLabels={pending:"En attente",confirmed:"Confirm\u00e9",done:"Termin\u00e9",cancelled:"Annul\u00e9"};
    var col=stColors[r.status]||"#888";
    var lbl=stLabels[r.status]||r.status;
    h+='<div style="display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">';
    h+='<div style="text-align:center;min-width:44px"><div style="font-size:20px;font-weight:900;line-height:1">'+parseInt(dp[2])+'</div><div style="font-size:11px;color:var(--text3)">'+mois[parseInt(dp[1])-1]+'</div></div>';
    h+='<div style="flex:1"><div style="font-weight:700;font-size:14px">'+r.service_nom+'</div>';
    h+='<div style="font-size:12px;color:var(--text2)">'+(r.heure_rdv?r.heure_rdv.slice(0,5):"")+' \u2022 '+salonNom+'</div></div>';
    h+='<div style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;background:'+col+'18;color:'+col+'">'+lbl+'</div>';
    h+='</div>';
  });
  el.innerHTML=h;
}

</script>
</body>
</html>
