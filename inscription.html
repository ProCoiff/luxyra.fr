<style>
:root{--gold:#c8a84e;--gold2:#b8940e;--bg:#0a0a0f;--bg2:#12141e;--bg3:#1a1c28;--text:#f5f0e8;--text2:rgba(245,240,232,.6);--text3:rgba(245,240,232,.35);--border:rgba(255,255,255,.08);--green:#2d9a5e;--red:#ef5350;--blue:#60a5fa;--f1:'Nunito',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f1);background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--gold);text-decoration:none}
/* Header */
.header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(10,10,15,.95);position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}

.login-link{font-size:13px;color:var(--text2)}

/* Container */
.container{max-width:640px;margin:0 auto;padding:32px 20px 60px}
/* Progress */
.progress{display:flex;gap:4px;margin-bottom:32px}
.progress-step{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.06);transition:background .3s}
.progress-step.done{background:var(--gold)}
.progress-step.active{background:var(--gold);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
/* Step header */
.step-head{text-align:center;margin-bottom:28px}
.step-num{font-size:48px;margin-bottom:8px}
.step-title{font-size:22px;font-weight:900;color:var(--gold)}
.step-desc{font-size:14px;color:var(--text2);margin-top:6px}

.fg label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;letter-spacing:.5px}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-size:14px;font-family:var(--f1);outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold)}
.fg input::placeholder{color:var(--text3)}
.fg .hint{font-size:11px;color:var(--text3);margin-top:4px}
.fg-row{display:flex;gap:12px}

.fg select option{background:var(--bg2);color:var(--text)}

.metier-btn{padding:14px 8px;border-radius:12px;border:2px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;transition:all .2s}
.metier-btn:hover{border-color:rgba(200,168,78,.3)}
.metier-btn.active{border-color:var(--gold);background:rgba(200,168,78,.1)}
.metier-btn .ico{font-size:24px;margin-bottom:4px}
.metier-btn .lbl{font-size:11px;font-weight:800;color:var(--text)}
/* Buttons */
.btn{padding:14px 24px;border-radius:12px;font-weight:800;font-size:15px;font-family:var(--f1);cursor:pointer;border:none;transition:all .2s}
.btn-gold{background:linear-gradient(135deg,#d4a843,#b8960f);color:#000}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(200,168,78,.3)}
.btn-outline{background:none;border:1.5px solid rgba(255,255,255,.15);color:var(--text)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-row{display:flex;gap:10px;margin-top:24px}
.btn-row .btn{flex:1}
/* Contrat */
.contrat-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;max-height:400px;overflow-y:auto;font-size:13px;color:var(--text2);line-height:1.9;margin-bottom:16px}
.contrat-box h3{color:var(--gold);font-size:15px;margin:16px 0 8px;font-weight:800}
.contrat-box h3:first-child{margin-top:0}
.contrat-box p{margin-bottom:8px}
.contrat-box ul{margin:8px 0 8px 20px}
.contrat-box ul li{margin-bottom:4px}
/* Checkbox */
.check-row{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border-radius:10px;border:1.5px solid var(--border);background:rgba(200,168,78,.04);cursor:pointer;margin-bottom:12px}
.check-row:hover{border-color:rgba(200,168,78,.3)}
.check-row input[type="checkbox"]{width:20px;height:20px;min-width:20px;margin-top:2px;cursor:pointer;accent-color:var(--gold)}
.check-row span{font-size:13px;color:var(--text2);line-height:1.5}
/* Success */

.success .ico{font-size:64px;margin-bottom:16px}
.success h2{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:8px}

.success .box{background:var(--bg2);border:1px solid rgba(200,168,78,.2);border-radius:14px;padding:20px;margin:24px auto;max-width:400px;text-align:left}
.success .box .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}

.info-banner{background:rgba(200,168,78,.08);border:1px solid rgba(200,168,78,.2);border-radius:12px;padding:16px;margin-bottom:20px;font-size:13px;color:var(--text2);line-height:1.7}
.info-banner strong{color:var(--gold)}
/* Error */
.err{background:rgba(239,83,80,.1);border:1px solid rgba(239,83,80,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
/* Footer */
.footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);border-top:1px solid var(--border)}
/* Mobile */
@media(max-width:500px){.fg-row{flex-direction:column;gap:0}.metier-grid{grid-template-columns:repeat(2,1fr)}.container{padding:20px 16px 40px}}
</style>

async function doSubmit(){
  DATA.cgvAccepted=document.getElementById("chkCGV")&&document.getElementById("chkCGV").checked;
  DATA.confAccepted=document.getElementById("chkConf")&&document.getElementById("chkConf").checked;
  if(!DATA.cgvAccepted){showErr("Veuillez accepter les CGV et le contrat d\u2019abonnement");return;}
  if(!DATA.confAccepted){showErr("Veuillez accepter la politique de confidentialit\u00e9");return;}

  var btn=document.getElementById("submitBtn");
  btn.disabled=true;btn.textContent="\u23f3 Cr\u00e9ation en cours...";

  try{
    // 0. Generate contract signature (SHA-256 hash)
    var contratText=getContratHTML().replace(/<[^>]+>/g,"");
    var signatureData={
      signataire:DATA.gerantPrenom.trim()+" "+DATA.gerantNom.trim(),
      email:DATA.email.trim(),
      etablissement:DATA.nom.trim(),
      date:new Date().toISOString(),
      contrat_hash:await sha256(contratText),
      cgv_accepted:true,
      confidentialite_accepted:true
    };

    // 1. Check email not already used
    var check=await sb.from("salons").select("id").eq("email",DATA.email.trim()).limit(1);
    if(check.data&&check.data.length>0){showErr("Cet email est d\u00e9j\u00e0 utilis\u00e9. Connectez-vous ou utilisez un autre email.");btn.disabled=false;btn.textContent="\u2705 Cr\u00e9er mon compte gratuit";return;}

    // 2. Create auth user
    var auth=await sb.auth.signUp({email:DATA.email.trim(),password:DATA.pass});
    if(auth.error){showErr("Erreur: "+auth.error.message);btn.disabled=false;btn.textContent="\u2705 Cr\u00e9er mon compte gratuit";return;}
    var userId=auth.data.user?auth.data.user.id:null;

    // 3. Calculate trial end
    var trialEnd=new Date();trialEnd.setDate(trialEnd.getDate()+14);

    // 4. Generate subdomain
    var subdomain=DATA.nom.trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,30);

    // 5. Create salon with signature
    var salonData={
      nom:DATA.nom.trim(),
      email:DATA.email.trim(),
      telephone:DATA.tel.trim(),
      adresse:DATA.adresse.trim(),
      cp:DATA.cp.trim(),
      ville:DATA.ville.trim(),
      siret:DATA.siret.trim(),
      metier:DATA.metier,
      forme_juridique:DATA.formeJur,
      mode_activite:DATA.modeActivite,
      gerant_nom:DATA.gerantNom.trim(),
      gerant_prenom:DATA.gerantPrenom.trim(),
      user_id:userId,
      plan:"essential",
      status:"trial",
      trial_end:trialEnd.toISOString().slice(0,10),
      subdomain:subdomain,
      verification_status:"pending",
      config_json:JSON.stringify({nom:DATA.nom.trim(),metier:DATA.metier,
      forme_juridique:DATA.formeJur,mode_activite:DATA.modeActivite,adresse:DATA.adresse.trim(),cp:DATA.cp.trim(),ville:DATA.ville.trim(),tel:DATA.tel.trim()}),
      sms_credits:0,
      sms_used:0,
      cgv_accepted_at:new Date().toISOString(),
      contrat_accepted_at:new Date().toISOString(),
      contrat_signature:JSON.stringify(signatureData)
    };

    var r=await sb.from("salons").insert(salonData).select();
    if(r.error){showErr("Erreur: "+r.error.message);btn.disabled=false;btn.textContent="\u2705 Cr\u00e9er mon compte gratuit";return;}

    // 6. Create default collab
    if(r.data&&r.data[0]){
      var salonId=r.data[0].id;
      await sb.from("collaborateurs").insert({
        salon_id:salonId,
        nom:DATA.gerantPrenom.trim(),
        initiales:(DATA.gerantPrenom[0]||"").toUpperCase()+(DATA.gerantNom[0]||"").toUpperCase(),
        couleur:"#c8a84e",
        actif:true
      });
    }

    // Success
    STEP=4;render();
  }catch(e){
    showErr("Erreur inattendue: "+e.message);
    btn.disabled=false;btn.textContent="\u2705 Cr\u00e9er mon compte gratuit";
  }
}

// === HELPERS ===
async function sha256(text){
  var encoder=new TextEncoder();
  var data=encoder.encode(text);
  var hash=await crypto.subtle.digest("SHA-256",data);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");
}
function showErr(msg){var el=document.getElementById("stepErr");if(el){el.style.display="block";el.textContent=msg;el.scrollIntoView({behavior:"smooth",block:"center"});}}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

render();
