<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mon compte – Luxyra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#050508;--bg2:#0d0d14;--card:#12121c;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.12);--text:#f5f5f7;--text2:#a0a0b0;--text3:#606070;--gold:#c8a84e;--gold-bg:rgba(200,168,78,.08);--gold2:rgba(200,168,78,.15);--green:#4ade80;--red:#f87171;--blue:#60a5fa;--orange:#fb923c;--r:14px;--f1:'DM Sans',sans-serif;--f2:'Playfair Display',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--f1);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--gold);text-decoration:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:50}
.logo{font-family:var(--f2);font-size:18px;font-weight:900;color:var(--gold);cursor:pointer;display:flex;align-items:center;gap:6px}
.logo img{flex-shrink:0}
.container{max-width:560px;margin:0 auto;padding:20px 16px 60px}

/* AUTH FORMS */
.auth-page{max-width:420px;margin:40px auto;padding:0 16px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px}
.auth-card h1{font-family:var(--f2);font-size:26px;font-weight:900;margin-bottom:4px}
.auth-card .sub{font-size:14px;color:var(--text3);margin-bottom:24px}
.fg{margin-bottom:14px}
.fg label{font-size:12px;font-weight:600;color:var(--text3);display:block;margin-bottom:5px}
.fg input,.fg select{width:100%;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--f1);outline:none;transition:border .2s}
.fg input:focus{border-color:var(--gold)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:14px;border-radius:12px;border:none;font-weight:700;font-size:15px;cursor:pointer;font-family:var(--f1);transition:all .2s;width:100%;text-align:center;display:block}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:#d4b45e}
.btn-outline{background:none;border:1px solid var(--border2);color:var(--text)}
.btn-red{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.15)}
.err{display:none;background:rgba(248,113,113,.1);color:var(--red);padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px}
.consent{padding:10px 0;border-top:1px solid var(--border)}
.consent label{font-size:13px;display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;color:var(--text2)}

/* DASHBOARD */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:0}
.tab{flex:1;padding:14px 8px;text-align:center;font-size:13px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--gold);border-color:var(--gold)}
.section{margin-bottom:24px}
.section-title{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}

/* RDV LIST */
.rdv-item{display:flex;gap:12px;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.rdv-item:last-child{border:none}
.rdv-date{text-align:center;min-width:48px}
.rdv-date .d{font-size:22px;font-weight:900;line-height:1}
.rdv-date .m{font-size:11px;color:var(--text3);text-transform:uppercase}
.rdv-info{flex:1}
.rdv-svc{font-weight:700;font-size:14px}
.rdv-det{font-size:12px;color:var(--text2);margin-top:2px}
.rdv-salon{font-size:11px;color:var(--gold);margin-top:2px}
.rdv-status{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
.st-pending{background:rgba(251,146,60,.12);color:var(--orange)}
.st-confirmed{background:rgba(74,222,128,.12);color:var(--green)}
.st-done{background:rgba(96,165,250,.12);color:var(--blue)}
.st-cancelled{background:rgba(248,113,113,.12);color:var(--red)}

/* PROFILE */
.avatar-area{text-align:center;margin-bottom:20px}
.avatar{width:80px;height:80px;border-radius:50%;background:var(--gold);color:#000;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;margin:0 auto 8px;font-family:var(--f2)}
.user-name{font-size:18px;font-weight:800}
.user-email{font-size:13px;color:var(--text3)}

/* SETTINGS ROW */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border:none}
.setting-label{font-size:14px;font-weight:600}
.setting-desc{font-size:12px;color:var(--text3);margin-top:2px}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:22px}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty .ico{font-size:40px;margin-bottom:8px}

.footer{text-align:center;padding:20px;font-size:11px;color:var(--text3);margin-top:20px}

@media(max-width:440px){.fg-row{grid-template-columns:1fr}.auth-card{padding:24px 16px}}
</style>
</head>

async function sha256(pass){
  var enc=new TextEncoder().encode(pass);
  var hash=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
// FIX I7: Salted hash (email as salt) — prevents rainbow table attacks
async function sha256Salted(email, pass){
  return await sha256(email.toLowerCase().trim() + ":" + pass);
}
function api(path,opts){return fetch(SB_URL+"/rest/v1/"+path,Object.assign({headers:HDR},opts||{}));}

  api("clients_beautypro?email=eq."+encodeURIComponent(CLIENT.email)).then(function(r){return r.json();}).then(function(d){

      var fresh=d[0];

      CLIENT.adresse=fresh.adresse||CLIENT.adresse;CLIENT.cp=fresh.cp||CLIENT.cp;
      CLIENT.ville=fresh.ville||CLIENT.ville;CLIENT.date_naissance=fresh.date_naissance||CLIENT.date_naissance;
      CLIENT.sms_ok=fresh.sms_ok;CLIENT.email_ok=fresh.email_ok;
      saveSession();render();
    }
  }).catch(function(e){});
}

// ========== RENDER ==========
function render(){
  var h='';
  // Topbar
  h+='<div class="topbar">';
  h+='<a href="/marketplace.html" class="logo"><img src="data:image/webp;base64,UklGRmQBAABXRUJQVlA4IFgBAAAwBwCdASocABwAPlEkj0WjoiEUBAA4BQSygFqNepnz7s+gG+S/NaRCkYmB1gF7Roipp5K0kA8htR3BKJappviwSQAA/k/0x2J6ijzZRhFs1r/5IDhiviqddOMQjtxK+mECTpmtlJrL1i0jTjZMcDd3aHBbEnEJp6yuBDLm2Oec4P+NnKccQ82fzzXfcUxIKkh4+RoxhXFqbq3TDtkq7zri4vtjuE/fjPrXflEh/isGryE4tgUyK/WiFE4GzQCmqPKIHjsp6hECRADPeyjkGod311jak0D11hk+7Sm2RpPqZ62pIWtl6oauPytG//F+bbtaApcXNGS0YydK83qhfJXid++U6/27A4lltV1T85xLits5k8fkr+TZ2AK7V6VgkHct1bGROHjcciObP6nPX0wVQngXHbJkbV9Y9T9F5OB6h3e6nzv0wXZILWcZdOtSfqu5WGZ8KbPAAA==" style="width:22px;height:22px;border-radius:4px" alt="L">Luxyra</a>';
  if(CLIENT){

    h+='<button onclick="logout()" style="padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text3);font-size:12px;cursor:pointer">D\u00e9connexion</button>';

// ========== DASHBOARD ==========
function renderDashboard(){
  if(!CLIENT)return'';
  var initials=(CLIENT.prenom?CLIENT.prenom[0]:"")+(CLIENT.nom?CLIENT.nom[0]:"");
  var h='<div class="container">';

  // Tabs
  h+='<div class="tab-bar">';
  h+='<div class="tab'+(TAB==="rdv"?" active":"")+'" onclick="TAB=\'rdv\';loadMyRdvs()">\ud83d\udcc5 Mes RDV</div>';
  h+='<div class="tab'+(TAB==="tickets"?" active":"")+'" onclick="TAB=\'tickets\';render()">\ud83c\udfab Tickets</div>';
  h+='<div class="tab'+(TAB==="fidelite"?" active":"")+'" onclick="TAB=\'fidelite\';render()">\ud83c\udf1f Fid\u00e9lit\u00e9</div>';
  h+='<div class="tab'+(TAB==="cartes"?" active":"")+'" onclick="TAB=\'cartes\';render()">\ud83d\udcb3 Cartes</div>';
  h+='<div class="tab'+(TAB==="profile"?" active":"")+'" onclick="TAB=\'profile\';render()">\ud83d\udc64 Profil</div>';
  h+='<div class="tab'+(TAB==="settings"?" active":"")+'" onclick="TAB=\'settings\';render()">\u2699\ufe0f R\u00e9glages</div>';
  h+='</div>';
  
  if(TAB==="rdv")h+=renderRdvTab();
  else if(TAB==="tickets")h+=renderTicketsTab();
  else if(TAB==="fidelite")h+=renderFideliteTab();
  else if(TAB==="cartes")h+=renderCartesTab();
  else if(TAB==="profile")h+=renderProfileTab();
  else if(TAB==="settings")h+=renderSettingsTab();
  
  h+='</div>';
  return h;
}

// --- RDV TAB ---
function renderRdvTab(){
  var h='';
  var mois=["Jan","F\u00e9v","Mar","Avr","Mai","Jun","Jul","Ao\u00fb","Sep","Oct","Nov","D\u00e9c"];
  var stLabels={pending:"En attente",confirmed:"Confirm\u00e9",done:"Termin\u00e9",cancelled:"Annul\u00e9"};
  var stClasses={pending:"st-pending",confirmed:"st-confirmed",done:"st-done",cancelled:"st-cancelled"};
  
  var today=new Date().toISOString().slice(0,10);
  var upcoming=CLIENT_RDVS.filter(function(r){return r.date_rdv>=today&&r.status!=="cancelled"&&r.status!=="done";});
  var past=CLIENT_RDVS.filter(function(r){return (r.date_rdv<today&&r.status!=="cancelled")||r.status==="done";});
  var cancelled=CLIENT_RDVS.filter(function(r){return r.status==="cancelled";});
  // Override status label for past confirmed → Terminé
  function getStatusLabel(r){
    if(r.status==="done")return "Termin\u00e9";
    if(r.date_rdv<today&&r.status!=="cancelled")return "Termin\u00e9";
    return stLabels[r.status]||r.status;
  }
  function getStatusClass(r){
    if(r.status==="done"||(r.date_rdv<today&&r.status!=="cancelled"))return "st-done";
    return stClasses[r.status]||"";
  }
  
  // --- UPCOMING ---
  h+='<div class="section"><div class="section-title">\ud83d\udcc5 \u00c0 venir ('+upcoming.length+')</div>';
  if(upcoming.length){
    upcoming.forEach(function(r){
      var dp=r.date_rdv.split("-");
      h+='<div class="card" style="margin-bottom:8px">';
      h+='<div class="rdv-item" style="border:none;padding:0">';
      h+='<div class="rdv-date"><div class="d">'+parseInt(dp[2])+'</div><div class="m">'+mois[parseInt(dp[1])-1]+'</div></div>';
      h+='<div class="rdv-info"><div class="rdv-svc">'+r.service_nom+'</div>';
      h+='<div class="rdv-det">'+(r.heure_rdv?r.heure_rdv.slice(0,5):"")+' \u2022 '+(r.collaborateur_nom||"")+' \u2022 '+r.service_prix+'\u20ac</div>';
      h+='<div class="rdv-salon">\ud83c\udfe0 '+(r.salon_nom||"Salon")+'</div></div>';
      h+='<div class="rdv-status '+getStatusClass(r)+'">'+getStatusLabel(r)+'</div>';
      h+='</div>';
      // Modification pending notice
      if(r.modification_demandee&&r.modification_status==="pending"){
        h+='<div style="margin-top:6px;padding:8px;background:rgba(251,146,60,.08);border-radius:8px;font-size:12px;color:var(--orange)">\u270f\ufe0f Modification demand\u00e9e \u2192 '+r.modification_date+' \u00e0 '+r.modification_heure+' \u2014 <em>En attente de confirmation</em></div>';
      }
      if(r.modification_status==="accepted"){
        h+='<div style="margin-top:6px;padding:8px;background:rgba(74,222,128,.08);border-radius:8px;font-size:12px;color:var(--green)">\u2705 Modification accept\u00e9e par le salon</div>';
      }
      if(r.modification_status==="refused"){
        h+='<div style="margin-top:6px;padding:8px;background:rgba(248,113,113,.08);border-radius:8px;font-size:12px;color:var(--red)">\u274c Modification refus\u00e9e par le salon</div>';
      }
      // Action buttons
      var canModify=!r.modification_demandee||r.modification_status!=="pending";
      h+='<div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">';
      h+='<button onclick="showModifyRdv(\''+r.id+'\',\''+r.salon_id+'\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--gold2);background:var(--gold-bg);color:var(--gold);font-size:12px;font-weight:700;cursor:'+(canModify?"pointer":"not-allowed")+';opacity:'+(canModify?"1":".4")+'"'+(canModify?"":' disabled')+'>\u270f\ufe0f Modifier</button>';
      h+='<button onclick="showCancelRdv(\''+r.id+'\',\''+r.salon_id+'\')" style="flex:1;padding:8px;border-radius:8px;border:1px solid rgba(248,113,113,.15);background:rgba(248,113,113,.06);color:var(--red);font-size:12px;font-weight:700;cursor:pointer">\u274c Annuler</button>';
      h+='</div></div>';
    });
  } else {
    h+='<div class="empty"><div class="ico">\ud83d\udcc5</div>Aucun rendez-vous \u00e0 venir<br><a href="/marketplace.html" style="font-size:13px">Trouver un salon</a></div>';
  }
  h+='</div>';
  
  // --- PAST (with invoice) ---
  if(past.length){
    h+='<div class="section"><div class="section-title">\ud83d\udcdc Historique ('+past.length+')</div>';
    past.slice(0,15).forEach(function(r){
      var dp=r.date_rdv.split("-");
      h+='<div class="card" style="margin-bottom:6px;opacity:.8">';
      h+='<div class="rdv-item" style="border:none;padding:0">';
      h+='<div class="rdv-date"><div class="d">'+parseInt(dp[2])+'</div><div class="m">'+mois[parseInt(dp[1])-1]+'</div></div>';
      h+='<div class="rdv-info"><div class="rdv-svc">'+r.service_nom+'</div>';
      h+='<div class="rdv-det">'+(r.heure_rdv?r.heure_rdv.slice(0,5):"")+' \u2022 '+r.service_prix+'\u20ac</div>';
      h+='<div class="rdv-salon">\ud83c\udfe0 '+(r.salon_nom||"Salon")+'</div></div>';
      h+='<div class="rdv-status '+getStatusClass(r)+'">'+getStatusLabel(r)+'</div>';
      h+='</div>';
      if(r.status==="done"||r.status==="confirmed"){
        h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end">';
        if(r.salon_id&&r.service_nom)h+='<button onclick="rebookRdv(\''+r.salon_id+'\',\''+encodeURIComponent(r.service_nom)+'\',\''+encodeURIComponent(r.salon_nom||"")+'\')" style="padding:6px 12px;border-radius:6px;border:1px solid rgba(200,168,78,.2);background:rgba(200,168,78,.06);color:var(--gold);font-size:11px;font-weight:600;cursor:pointer">\ud83d\udd01 Reprendre ce RDV</button>';
        h+='<button onclick="downloadReceipt(\''+r.id+'\')" style="padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:rgba(255,255,255,.04);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer">\ud83d\udcc4 Re\u00e7u</button>';
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }
  
  // --- CANCELLED ---
  if(cancelled.length){
    h+='<div class="section"><div class="section-title" style="color:var(--red)">\u274c Annul\u00e9s ('+cancelled.length+')</div>';
    cancelled.slice(0,5).forEach(function(r){
      var dp=r.date_rdv.split("-");
      h+='<div class="card" style="margin-bottom:6px;opacity:.4">';
      h+='<div class="rdv-item" style="border:none;padding:0">';
      h+='<div class="rdv-date"><div class="d">'+parseInt(dp[2])+'</div><div class="m">'+mois[parseInt(dp[1])-1]+'</div></div>';
      h+='<div class="rdv-info"><div class="rdv-svc" style="text-decoration:line-through">'+r.service_nom+'</div>';
      h+='<div class="rdv-det">'+(r.heure_rdv?r.heure_rdv.slice(0,5):"")+' \u2022 '+(r.salon_nom||"")+'</div></div>';
      h+='<div class="rdv-status st-cancelled">Annul\u00e9</div>';
      h+='</div></div>';
    });
    h+='</div>';
  }
  
  return h;
}

var FIDELITE_DATA=[];
var _fideliteLoaded=false;

async function loadFidelite(){
  if(!CLIENT||_fideliteLoaded)return;
  try{
    var r=await api("fidelite_client?select=*&client_beautypro_id=eq."+encodeURIComponent(CLIENT.email||CLIENT.id)+"&order=derniere_visite.desc");
    var data=await r.json();
    if(Array.isArray(data))FIDELITE_DATA=data;
    // Also try by ID if email returned nothing
    if(!FIDELITE_DATA.length&&CLIENT.id){
      var r2=await api("fidelite_client?select=*&client_beautypro_id=eq."+CLIENT.id+"&order=derniere_visite.desc");
      var d2=await r2.json();
      if(Array.isArray(d2)&&d2.length)FIDELITE_DATA=d2;
    }
    // Fetch CURRENT fidconf from each salon (not stale values from last visit)
    for(var fi=0;fi<FIDELITE_DATA.length;fi++){
      try{
        var sr=await api("salons_public?select=config_json&id=eq."+FIDELITE_DATA[fi].salon_id);
        var sd=await sr.json();
        if(Array.isArray(sd)&&sd[0]){
          var cfg={};try{cfg=typeof sd[0].config_json==="string"?JSON.parse(sd[0].config_json):sd[0].config_json||{};}catch(e){}
          if(cfg.fidconf){
            FIDELITE_DATA[fi].seuil_fidelite=cfg.fidconf.seuil||10;
            FIDELITE_DATA[fi].remise_fidelite=cfg.fidconf.remise||10;
            FIDELITE_DATA[fi].remise_type=cfg.fidconf.type||"amount";
          }
        }
      }catch(e){}
    }
    _fideliteLoaded=true;
  }catch(e){console.log("Fidelite load error:",e);}
}

function renderTicketsTab(){

async function emailReceipt(rdvId){
  var rdv=CLIENT_RDVS.find(function(r){return r.id===rdvId;});if(!rdv)return;
  if(!CLIENT||!CLIENT.email){alert("Aucun email enregistr\u00e9 sur votre compte.");return;}
  var btn=event.target;if(btn){btn.textContent="\u23f3 Envoi...";btn.disabled=true;}

  // Use stored ticket HTML if available, otherwise generate
  var ticketHtml;
  if(rdv.ticket_html){
    ticketHtml=rdv.ticket_html;
  }else{
    var salon={nom:rdv.salon_nom||"Salon",adresse:"",cp:"",ville:"",tel:"",siret:"",tva:"",tauxTVA:20};
    try{
      var sr=await api("salons?select=nom,config_json&id=eq."+rdv.salon_id);
      var sd=await sr.json();
      if(Array.isArray(sd)&&sd[0]){
        var cfg={};try{cfg=typeof sd[0].config_json==="string"?JSON.parse(sd[0].config_json):sd[0].config_json||{};}catch(e){}
        salon.nom=cfg.nom||sd[0].nom||"Salon";
        salon.adresse=cfg.adresse||"";salon.cp=cfg.cp||"";salon.ville=cfg.ville||"";
        salon.tel=cfg.tel||"";salon.siret=cfg.siret||"";salon.tva=cfg.tva||"";salon.tauxTVA=cfg.tauxTVA||20;
      }
    }catch(e){}
    ticketHtml=buildCompteTicketHTML(rdv,salon);
  }
  var salonNomEmail=rdv.salon_nom||"Salon";

  try{
    var resp=await fetch("/api/email/ticket",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        clientEmail:CLIENT.email,
        clientName:(CLIENT.prenom||"")+" "+(CLIENT.nom||""),
        salonName:salonNomEmail,
        ticketNum:rdv.ticket_num||("RDV-"+rdvId.slice(0,8)),
        ticketHtml:ticketHtml
      })
    });
    var data=await resp.json();
    if(data.success)alert("\u2705 Ticket envoy\u00e9 \u00e0 "+CLIENT.email);
    else alert("\u274c Erreur lors de l\u0027envoi: "+(data.error||""));
  }catch(e){alert("\u274c Erreur de connexion");}
  if(btn){btn.textContent="\u2709 Recevoir par email";btn.disabled=false;}
}

// Build ticket HTML for compte client (shared between downloadReceipt and emailReceipt)
function buildCompteTicketHTML(rdv,salon){
  var txTVA=salon.tauxTVA||20;
  var ttc=Number(rdv.service_prix)||0;
  var ht=Math.round(ttc*100/(100+txTVA)*100)/100;
  var tva=Math.round((ttc-ht)*100)/100;
  var dp=rdv.date_rdv?rdv.date_rdv.split("-"):["2026","01","01"];
  var dateFR=dp[2]+"/"+dp[1]+"/"+dp[0];
  var acompte=Number(rdv.acompte_montant)||0;

  var h="";
  // DUPLICATA
  h+="<div style='text-align:center;border:3px solid #000;padding:6px;margin-bottom:8px;font-weight:900;font-size:16px;letter-spacing:3px'>DUPLICATA</div>";
  // En-t\u00eate salon
  h+="<div style='text-align:center;border-bottom:1px solid #000;padding-bottom:8px;margin-bottom:8px'>";
  h+="<div style='font-weight:900;font-size:14px;letter-spacing:1px'>"+salon.nom.toUpperCase()+"</div>";
  h+="<div style='font-size:11px'>"+salon.adresse+"</div>";
  h+="<div style='font-size:11px'>"+(salon.cp||"")+" "+(salon.ville||"")+"</div>";
  if(salon.tel)h+="<div style='font-size:11px'>T\u00e9l: "+salon.tel+"</div>";
  h+="</div>";
  // Ticket info
  h+="<div style='text-align:center;margin-bottom:8px'>";
  h+="<div style='font-weight:900;font-size:13px'>Ticket de vente N\u00b0"+(rdv.ticket_num||"--")+"</div>";

// ========== AUTH ACTIONS ==========
async function doLogin(){
  var email=document.getElementById("lEmail").value.trim().toLowerCase();
  var pass=document.getElementById("lPass").value;
  if(!email||!pass){showErr("loginErr","Remplissez email et mot de passe");return;}
  var saltedHash=await sha256Salted(email, pass);
  var unsaltedHash=await sha256(pass);
  try{
    var r=await api("clients_beautypro?select=*&email=eq."+encodeURIComponent(email));
    var data=await r.json();
    if(!Array.isArray(data)||!data.length){showErr("loginErr","Aucun compte avec cet email");return;}
    var stored=data[0].password_hash;
    if(stored===saltedHash){
      // Salted hash matches — good
    }else if(stored===unsaltedHash){
      // Old unsalted hash matches — silently upgrade to salted
      api("clients_beautypro?id=eq."+data[0].id,{method:"PATCH",body:JSON.stringify({password_hash:saltedHash})});
    }else{
      showErr("loginErr","Mot de passe incorrect");return;
    }
    CLIENT=data[0];CLIENT.password_hash=saltedHash;PAGE="dashboard";TAB="rdv";
    api("clients_beautypro?id=eq."+CLIENT.id,{method:"PATCH",body:JSON.stringify({last_login:new Date().toISOString()})});
    saveSession();loadMyRdvs();render();
  }catch(e){showErr("loginErr","Erreur r\u00e9seau");}
}

async function doRegister(){
  var nom=document.getElementById("rNom").value.trim();
  var pre=document.getElementById("rPre").value.trim();
  var tel=document.getElementById("rTel").value.trim();
  var ddn=document.getElementById("rDdn").value;
  var genre=document.getElementById("rGenre").value;
  var email=document.getElementById("rEmail").value.trim().toLowerCase();
  var pass=document.getElementById("rPass").value;
  var pass2=document.getElementById("rPass2").value;
  var cgu=document.getElementById("rCgu").checked;
  if(!nom||!pre||!tel||!email||!pass){showErr("regErr","Remplissez tous les champs obligatoires");return;}
  if(!cgu){showErr("regErr","Vous devez accepter les CGU");return;}
  if(pass.length<6){showErr("regErr","Mot de passe : 6 caract\u00e8res minimum");return;}
  if(pass!==pass2){showErr("regErr","Les mots de passe ne correspondent pas");return;}
  var hash=await sha256Salted(email, pass);
  var smsOk=document.getElementById("rSms").checked;
  var emOk=document.getElementById("rEm").checked;
  try{
    var check=await api("clients_beautypro?select=id&email=eq."+encodeURIComponent(email));
    var ex=await check.json();
    if(ex&&ex.length){showErr("regErr","Un compte existe d\u00e9j\u00e0. Connectez-vous.");return;}
    var r=await fetch(SB_URL+"/rest/v1/clients_beautypro",{method:"POST",headers:Object.assign({},HDR,{"Prefer":"return=representation"}),body:JSON.stringify({email:email,password_hash:hash,nom:nom.toUpperCase(),prenom:pre,telephone:tel,date_naissance:ddn||null,genre:genre,sms_ok:smsOk,email_ok:emOk})});
    var data=await r.json();
    if(Array.isArray(data)&&data.length)CLIENT=data[0];
    else if(data&&data.id)CLIENT=data;
    else{showErr("regErr","Erreur lors de la cr\u00e9ation");return;}
    PAGE="dashboard";TAB="rdv";saveSession();render();
  }catch(e){showErr("regErr","Erreur r\u00e9seau: "+e.message);}
}

// ========== PROFILE ACTIONS ==========
async function saveProfile(){
  var nom=document.getElementById("pNom").value.trim();
  var pre=document.getElementById("pPre").value.trim();
  var tel=document.getElementById("pTel").value.trim();
  var ddn=document.getElementById("pDdn").value;
  var genre=document.getElementById("pGenre")?document.getElementById("pGenre").value:"";
  var adr=document.getElementById("pAdr")?document.getElementById("pAdr").value.trim():"";
  var cp=document.getElementById("pCp")?document.getElementById("pCp").value.trim():"";
  var ville=document.getElementById("pVille")?document.getElementById("pVille").value.trim():"";
  try{
    // 1. Save to clients_beautypro (main profile)
    await api("clients_beautypro?id=eq."+CLIENT.id,{method:"PATCH",body:JSON.stringify({nom:nom.toUpperCase(),prenom:pre,telephone:tel,date_naissance:ddn||null,genre:genre||null,adresse:adr,cp:cp,ville:ville,updated_at:new Date().toISOString()})});
    CLIENT.nom=nom.toUpperCase();CLIENT.prenom=pre;CLIENT.telephone=tel;CLIENT.date_naissance=ddn;CLIENT.genre=genre;CLIENT.adresse=adr;CLIENT.cp=cp;CLIENT.ville=ville;
    saveSession();
    // 2. Sync to ALL salon client records with same email (only non-empty fields)
    try{
      var syncObj={};
      if(nom)syncObj.nom=nom.toUpperCase();
      if(pre)syncObj.prenom=pre;
      if(tel)syncObj.telephone=tel;
      if(ddn)syncObj.date_naissance=ddn;
      if(genre)syncObj.sexe=genre;
      if(adr)syncObj.adresse=adr;
      if(cp)syncObj.cp=cp;
      if(ville)syncObj.ville=ville;
      if(Object.keys(syncObj).length){
        await api("clients?email=eq."+encodeURIComponent(CLIENT.email),{method:"PATCH",body:JSON.stringify(syncObj)});
      }
    }catch(e2){console.log("Sync salons:",e2);}
    var el=document.getElementById("profileMsg");if(el){el.style.display="block";el.style.color="var(--green)";el.textContent="\u2705 Profil mis \u00e0 jour dans tous vos salons";}
  }catch(e){var el=document.getElementById("profileMsg");if(el){el.style.display="block";el.style.color="var(--red)";el.textContent="Erreur";}}
}

async function changePassword(){
  var old=document.getElementById("pOldPass").value;
  var nw=document.getElementById("pNewPass").value;
  var nw2=document.getElementById("pNewPass2").value;
  if(!old||!nw){showMsg("passMsg","Remplissez tous les champs","var(--red)");return;}
  if(nw.length<6){showMsg("passMsg","6 caract\u00e8res minimum","var(--red)");return;}
  if(nw!==nw2){showMsg("passMsg","Les mots de passe ne correspondent pas","var(--red)");return;}
  // FIX I7: Try salted hash first, then unsalted for backward compat
  var oldSalted=await sha256Salted(CLIENT.email, old);
  var oldUnsalted=await sha256(old);
  if(oldSalted!==CLIENT.password_hash&&oldUnsalted!==CLIENT.password_hash){showMsg("passMsg","Mot de passe actuel incorrect","var(--red)");return;}
  var newHash=await sha256Salted(CLIENT.email, nw);
  await api("clients_beautypro?id=eq."+CLIENT.id,{method:"PATCH",body:JSON.stringify({password_hash:newHash})});
  CLIENT.password_hash=newHash;saveSession();
  showMsg("passMsg","\u2705 Mot de passe modifi\u00e9","var(--green)");
  document.getElementById("pOldPass").value="";document.getElementById("pNewPass").value="";document.getElementById("pNewPass2").value="";
}

function toggleNotif(el,field){
  var isOn=el.classList.contains("on");
  el.classList.toggle("on");
  CLIENT[field]=!isOn;saveSession();
  var body={};body[field]=!isOn;
  // Save to clients_beautypro (main profile)
  api("clients_beautypro?id=eq."+CLIENT.id,{method:"PATCH",body:JSON.stringify(body)});
  // Sync to ALL salon client records with same email
  try{
    api("clients?email=eq."+encodeURIComponent(CLIENT.email),{method:"PATCH",body:JSON.stringify(body)});
  }catch(e){}
}

// ========== LOAD DATA ==========
async function loadMyRdvs(){
  if(!CLIENT)return;
  try{
    // Get RDVs from rdv_online with salon name
    var r=await api("rdv_online?select=*,salons(nom)&client_beautypro_id=eq."+CLIENT.id+"&order=date_rdv.desc&limit=50");
    var data=await r.json();
    if(Array.isArray(data)){
      CLIENT_RDVS=data.map(function(d){d.salon_nom=d.salons?d.salons.nom:"";return d;});
    }
    // Fallback by email
    var r2=await api("rdv_online?select=*,salons(nom)&client_email=eq."+encodeURIComponent(CLIENT.email)+"&order=date_rdv.desc&limit=50");
    var data2=await r2.json();
    if(Array.isArray(data2)){data2.forEach(function(d){d.salon_nom=d.salons?d.salons.nom:"";var ex=false;CLIENT_RDVS.forEach(function(x){if(x.id===d.id)ex=true;});if(!ex)CLIENT_RDVS.push(d);});}
    
    // Load POS tickets via Worker (bypasses RLS)
    try{
      var r3=await fetch("/api/client/tickets",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({email:CLIENT.email})
      });
      var tkData=await r3.json();
      if(tkData&&Array.isArray(tkData.tickets)){
        tkData.tickets.forEach(function(t){
          var ex=false;CLIENT_RDVS.forEach(function(x){if(x.id===t.id)ex=true;});
          if(!ex)CLIENT_RDVS.push(t);
        });
      }
    }catch(e3){}
    
    // Sort by date desc
    CLIENT_RDVS.sort(function(a,b){return (a.date_rdv||"")>(b.date_rdv||"")?-1:1;});
    render();
  }catch(e){}
}

async function doDeleteAccount(){
  var confirm=document.getElementById("delConfirm");
  if(!confirm||confirm.value!=="SUPPRIMER"){confirm.style.borderColor="var(--red)";confirm.focus();return;}
  try{
    var email=CLIENT.email;
    // Anonymize rdv_online
    await api("rdv_online?client_beautypro_id=eq."+CLIENT.id,{method:"PATCH",body:JSON.stringify({client_beautypro_id:null,client_nom:"Anonyme",client_prenom:"",client_tel:"",client_email:""})});
    // Anonymize appointments in all salons
    await api("clients?email=eq."+encodeURIComponent(email),{method:"PATCH",body:JSON.stringify({nom:"ANONYME",prenom:"",telephone:"",email:"",adresse:"",cp:"",ville:"",date_naissance:null,notes:"",actif:false})});
    // Delete fidelite_client
    await api("fidelite_client?client_beautypro_id=eq."+encodeURIComponent(email),{method:"DELETE"});
    // Delete client_salon links
    await api("client_salon?client_id=eq."+CLIENT.id,{method:"DELETE"});
    // Delete the account
    await api("clients_beautypro?id=eq."+CLIENT.id,{method:"DELETE"});
    logout();
  }catch(e){alert("Erreur: "+e.message);}
}

function showModifyRdv(rdvId,salonId){

  var h='<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px" onclick="closePopup(\'modifyModal\')">';
  h+='<div onclick="event.stopPropagation()" style="background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;max-width:420px;width:100%">';
  h+='<h2 style="margin-bottom:12px">\u270f\ufe0f Modifier le rendez-vous</h2>';
  h+='<div style="font-size:14px;font-weight:700;margin-bottom:4px">'+rdv.service_nom+'</div>';
  h+='<div style="font-size:13px;color:var(--text3);margin-bottom:16px">'+(rdv.salon_nom||"Salon")+' \u2022 '+(rdv.collaborateur_nom||"")+'</div>';
  h+='<div class="fg"><label>Nouvelle date</label><input type="date" id="modDate" value="'+rdv.date_rdv+'" min="'+new Date().toISOString().slice(0,10)+'"></div>';
  h+='<div class="fg"><label>Nouvelle heure</label><input type="time" id="modTime" value="'+(rdv.heure_rdv?rdv.heure_rdv.slice(0,5):"09:00")+'"></div>';
  h+='<div class="fg"><label>Message au salon (optionnel)</label><textarea id="modMsg" rows="2" style="width:100%;padding:10px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;resize:vertical" placeholder="Ex: Je souhaite d\u00e9caler d\u0027une heure..."></textarea></div>';
  h+='<div style="font-size:12px;color:var(--orange);margin-bottom:14px">\u26a0\ufe0f La modification sera soumise au salon pour validation.</div>';
  h+='<div style="display:flex;gap:8px">';
  h+='<button onclick="closePopup(\'modifyModal\')" class="btn btn-outline" style="flex:1">Annuler</button>';
  h+='<button onclick="submitModifyRdv(\''+rdvId+'\',\''+salonId+'\')" class="btn btn-gold" style="flex:1">Demander la modification</button>';
  h+='</div></div></div>';
  var el=document.createElement("div");el.id="modifyModal";el.innerHTML=h;document.body.appendChild(el);
}

async function submitModifyRdv(rdvId,salonId){
  var date=document.getElementById("modDate").value;
  var time=document.getElementById("modTime").value;
  var msg=document.getElementById("modMsg").value.trim();
  if(!date||!time){alert("Date et heure requises");return;}
  try{
    await api("rdv_online?id=eq."+rdvId,{method:"PATCH",body:JSON.stringify({
      modification_demandee:true,
      modification_date:date,
      modification_heure:time,
      modification_message:msg||null,
      modification_status:"pending"
    })});
    closePopup("modifyModal");
    // Update local
    var r=CLIENT_RDVS.find(function(x){return x.id===rdvId;});
    if(r){r.modification_demandee=true;r.modification_status="pending";}
    showToast("\u2705 Demande de modification envoy\u00e9e");
    render();
  }catch(e){alert("Erreur: "+e.message);}
}

async function submitCancelRdv(rdvId){
  var reason=document.getElementById("cancelReason").value;
  if(!reason){alert("Veuillez indiquer un motif");return;}
  try{
    await api("rdv_online?id=eq."+rdvId,{method:"PATCH",body:JSON.stringify({
      status:"cancelled",
      cancelled_by:"client",
      cancel_reason:reason,
      cancelled_at:new Date().toISOString()
    })});
    closePopup("cancelModal");
    var r=CLIENT_RDVS.find(function(x){return x.id===rdvId;});
    if(r){r.status="cancelled";}
    showToast("\u2705 Rendez-vous annul\u00e9");
    render();
  }catch(e){alert("Erreur: "+e.message);}
}

// ========== RECEIPT / FACTURE ==========
async function downloadReceipt(rdvId){
  var rdv=CLIENT_RDVS.find(function(r){return r.id===rdvId;});if(!rdv)return;
  
  var salonNom=rdv.salon_nom||"Salon";
  var ticketNum=rdv.ticket_num||"";
  
  var w=window.open("","_blank","width=380,height=700");if(!w)return;
  var h="<!DOCTYPE html><html><head><meta charset='utf-8'><title>Ticket "+salonNom+" N\u00b0"+ticketNum+"</title>";
  h+="<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Courier New',monospace;padding:15px;max-width:340px;margin:0 auto;font-size:12px;line-height:1.5;color:#000;background:#fff}";
  h+="table{width:100%;border-collapse:collapse}@media print{body{padding:5px}}</style></head><body>";
  
  // Use stored ticket HTML (exact same as printed at checkout) if available
  if(rdv.ticket_html){
    h+=rdv.ticket_html;
  }else{
    // Fallback to generated ticket
    var salon={nom:salonNom,adresse:"",cp:"",ville:"",tel:"",siret:"",tva:"",sousTitre:"",tauxTVA:20};
    try{
      var sr=await api("salons?select=nom,config_json&id=eq."+rdv.salon_id);
      var sd=await sr.json();
      if(Array.isArray(sd)&&sd[0]){
        var cfg={};try{cfg=typeof sd[0].config_json==="string"?JSON.parse(sd[0].config_json):sd[0].config_json||{};}catch(e){}
        salon.nom=cfg.nom||sd[0].nom||"Salon";
        salon.adresse=cfg.adresse||"";salon.cp=cfg.cp||"";salon.ville=cfg.ville||"";
        salon.tel=cfg.tel||"";salon.siret=cfg.siret||"";salon.tva=cfg.tva||"";
        salon.sousTitre=cfg.sousTitre||"";salon.tauxTVA=cfg.tauxTVA||20;
      }
    }catch(e){}
    h+=buildCompteTicketHTML(rdv,salon);
  }
  h+="</body></html>";
  
  w.document.write(h);w.document.close();
  setTimeout(function(){w.print();},500);
}

function rebookRdv(salonId,serviceNom,salonNom){
  // Open salon's booking page with service pre-selected
  var svcName=decodeURIComponent(serviceNom);
  var sName=decodeURIComponent(salonNom);
  // Try to open the salon's site.html booking page
  window.open("site.html?s="+salonId+"&book="+encodeURIComponent(svcName),"_blank");
  showToast("\ud83d\udd01 Redirection vers "+sName+" pour r\u00e9server...");
}

function closePopup(id){var el=document.getElementById(id);if(el)el.remove();}
function showToast(msg){
  var el=document.createElement("div");
  el.style.cssText="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:300;border:1px solid var(--gold);box-shadow:0 4px 20px rgba(0,0,0,.4)";
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(function(){el.remove();},3000);
}

// ========== UTILS ==========
function showErr(id,msg){var el=document.getElementById(id);if(el){el.style.display="block";el.textContent=msg;}}
function showMsg(id,msg,color){var el=document.getElementById(id);if(el){el.style.display="block";el.style.color=color||"var(--text)";el.textContent=msg;}}
