<title>Luxyra Admin</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
--bg:#06080f;--bg2:#0c0e16;--bg3:#12141e;--bg4:#1a1c28;
--gold:#d4a843;--gold2:#b8960f;--gold-bg:rgba(212,168,67,.08);--gold-bg2:rgba(212,168,67,.15);
--blue:#60a5fa;--green:#4ade80;--red:#f87171;--orange:#fb923c;--purple:#a78bfa;--cyan:#22d3ee;
--red-bg:rgba(248,113,113,.1);--green-bg:rgba(74,222,128,.1);--orange-bg:rgba(251,146,60,.1);--blue-bg:rgba(96,165,250,.1);
--text:#e8edf5;--text2:#94a3b8;--text3:#5a6578;
--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
--f1:'DM Sans',system-ui,sans-serif;--f2:'Cormorant Garamond',Georgia,serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--f1);font-size:14px;line-height:1.5;overflow-x:hidden}
a{color:var(--gold);text-decoration:none}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:250px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.sb-logo{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo img{border-radius:8px}
.sb-logo-text{font-weight:800;font-size:18px;color:var(--text)}
.sb-logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;color:var(--text3);padding:16px 12px 6px;letter-spacing:1.5px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:2px}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--gold-bg);color:var(--gold);font-weight:700}
.sb-item .icon{width:20px;text-align:center;font-size:16px}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;font-family:var(--mono)}
.sb-footer{padding:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}

/* MAIN */
.main{margin-left:250px;padding:24px;min-height:100vh;transition:margin .3s}
.burger{display:none;position:fixed;top:14px;left:14px;z-index:101;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:18px;cursor:pointer;color:var(--text)}
@media(max-width:900px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:none}
.main{margin-left:0;padding:16px;padding-top:60px}
.burger{display:block}
}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.topbar h1{font-size:22px;font-weight:800}
.topbar h1 span{font-size:13px;font-weight:500;color:var(--text3);margin-left:8px}
.topbar-actions{display:flex;gap:8px}
.tb-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f1);transition:all .15s}
.tb-btn:hover{border-color:var(--gold);color:var(--gold)}
.tb-btn.primary{background:var(--gold);color:#0a0a0a;border-color:var(--gold)}
.tb-btn.primary:hover{background:#e0b850}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden}
.kpi-label{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:800;font-family:var(--mono)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi-icon{position:absolute;top:14px;right:14px;font-size:28px;opacity:.15}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.table-title{font-weight:700;font-size:15px}
.table-filter{display:flex;gap:4px}
.tf-btn{padding:5px 12px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f1)}
.tf-btn.active,.tf-btn:hover{background:var(--gold-bg);color:var(--gold)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover{background:rgba(255,255,255,.02)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card h3{font-size:16px;font-weight:700;margin-bottom:12px}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;font-family:var(--mono)}
.badge-gold{background:var(--gold-bg);color:var(--gold)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}

/* DETAIL PANEL */
.dp-overlay{position:fixed;inset:0;z-index:200;display:none}
.dp-overlay.open{display:flex}
.dp-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.dp-panel{position:absolute;right:0;top:0;bottom:0;width:480px;max-width:100%;background:var(--bg2);border-left:1px solid var(--border);padding:24px;overflow-y:auto}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.dp-close{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:8px}
.dp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.dp-stat{background:var(--bg3);border-radius:10px;padding:12px;text-align:center}
.dp-stat .n{font-size:20px;font-weight:800;font-family:var(--mono)}
.dp-stat .l{font-size:10px;color:var(--text3);margin-top:2px}
.dp-section{margin-bottom:16px}
.dp-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.dp-field{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.dp-field .k{color:var(--text3)}
.dp-field .v{font-weight:600;text-align:right}
.dp-actions{display:flex;flex-wrap:wrap;gap:6px}
.dp-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f1);transition:all .15s}
.dp-btn:hover{border-color:var(--gold);color:var(--gold)}
.dp-btn.success{border-color:var(--green);color:var(--green)}
.dp-btn.danger{border-color:var(--red);color:var(--red)}

/* SEARCH */
.search-box{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px}
.search-box input{flex:1;background:none;border:none;color:var(--text);font-size:14px;outline:none;font-family:var(--f1)}

/* SETTINGS */
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px}
.settings-card h3{font-size:15px;font-weight:700;margin-bottom:14px}
.sf-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:10px}
.sf-label{font-weight:600;font-size:13px}
.sf-desc{font-size:11px;color:var(--text3)}
.sf-input{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-family:var(--f1);outline:none}

/* CHART */
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.chart-title{font-weight:700;font-size:15px;margin-bottom:14px}
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chart-bar-label{width:100px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.chart-bar-track{flex:1;height:28px;background:var(--bg3);border-radius:8px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;font-family:var(--mono);transition:width .6s}
.chart-bar-val{width:50px;font-weight:700;font-family:var(--mono);font-size:12px}

/* ALERTS */
.alert-item{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative}
.alert-item:hover{background:rgba(255,255,255,.02)}
.alert-dot{position:absolute;left:6px;top:50%;transform:translateY(-50%);width:6px;height:6px;background:var(--gold);border-radius:50%}
.alert-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.alert-content{flex:1}
.alert-title{font-weight:700;font-size:13px}
.alert-desc{font-size:12px;color:var(--text3);margin-top:2px}
.alert-time{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:4px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center}
.mbox{max-width:500px;width:calc(100% - 32px);background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;max-height:90vh;overflow-y:auto}
.mbox select option{color:#000;background:#fff}

/* TD */
.td-salon{display:flex;align-items:center;gap:10px}
.td-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.td-name{font-weight:700;font-size:13px}
.td-city{font-size:11px;color:var(--text3)}
.td-actions{display:flex;gap:4px}
.td-btn{padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:14px;cursor:pointer;transition:all .15s}
.td-btn:hover{background:var(--gold-bg);border-color:var(--gold)}
</style>
</head>

// ===== AUTH =====
async function checkAdminSession(){
  try{
    _adminSb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    var sess=await _adminSb.auth.getSession();
    if(sess.data.session){
      _adminUserId=sess.data.session.user.id;
      var check=await _adminSb.from("admin_users").select("*").eq("user_id",_adminUserId).single();
      if(check.data){_adminIsOnline=true;await loadAdminData();document.querySelector(".sidebar").style.display="flex";document.getElementById("mainContent").style.marginLeft="";render();return;}
    }
  }catch(e){}
  showAdminLogin();
}

async function doAdminLogin(){
  if(!_adminSb){showAdminLoginError("Supabase non configur\u00e9");return;}
  var email=document.getElementById("adminEmail").value.trim();
  var pass=document.getElementById("adminPass").value;
  if(!email||!pass){showAdminLoginError("Remplissez email et mot de passe");return;}
  var result=await _adminSb.auth.signInWithPassword({email:email,password:pass});
  if(result.error){showAdminLoginError(result.error.message);return;}
  _adminUserId=result.data.user.id;
  var adminCheck=await _adminSb.from("admin_users").select("*").eq("user_id",_adminUserId).single();
  if(!adminCheck.data){showAdminLoginError("Ce compte n\u0027est pas administrateur.");await _adminSb.auth.signOut();return;}
  _adminIsOnline=true;
  document.querySelector(".sidebar").style.display="flex";
  document.querySelector(".burger").style.display="";
  document.getElementById("mainContent").style.marginLeft="";
  await loadAdminData();
  render();
  loadDemandes();
}

function showAdminLoginError(m){var e=document.getElementById("adminLoginError");if(e){e.style.display="block";e.textContent=m;}}

async function doAdminLogout(){await _adminSb.auth.signOut();_adminIsOnline=false;_adminUserId=null;SALONS=[];showAdminLogin();}

// ===== LOAD DATA =====
async function loadAdminData(){
  if(!_adminSb||!_adminIsOnline)return;
  try{
    // Load salons with stats
    var r=await _adminSb.from("salons").select("*");
    if(r.data){
      SALONS=r.data.map(function(s,i){
        var cfg=s.config_json?JSON.parse(s.config_json):{};
        return{
          id:s.id,nom:s.nom||"Sans nom",ville:s.ville||"",email:s.email||"",tel:s.tel||"",siret:s.siret||"",
          plan:s.plan||"essential",status:s.status||"active",billing:s.billing||"monthly",
          metier:cfg.metier||s.metier||"coiffure",subdomain:s.subdomain||"",
          clients:0,tickets:0,ca:0,collabs:0,
          created:s.created_at,lastLogin:s.last_login||s.updated_at,
          trialEnd:s.trial_end,stripeId:s.stripe_subscription_id||"\u2014",
          color:colors[i%colors.length]
        };
      });
      // Load stats per salon
      for(var i=0;i<SALONS.length;i++){
        var sid=SALONS[i].id;
        try{
          var cl=await _adminSb.from("clients").select("id",{count:"exact",head:true}).eq("salon_id",sid);
          if(cl.count!==null)SALONS[i].clients=cl.count;
          var co=await _adminSb.from("collaborateurs").select("id",{count:"exact",head:true}).eq("salon_id",sid);
          if(co.count!==null)SALONS[i].collabs=co.count;
        }catch(e){}
      }
    }
    // Load alerts from admin_log
    try{
      var al=await _adminSb.from("admin_log").select("*").order("created_at",{ascending:false}).limit(20);
      if(al.data)ALERTS=al.data.map(function(a){
        return{title:a.action,desc:a.details||"",time:fmt(a.created_at),read:true,icon:"\ud83d\udcdd",iconBg:"var(--bg3)",iconColor:"var(--text2)"};
      });
    }catch(e){}
    // Update badges
    var bs=document.getElementById("badgeSalons");
    if(bs)bs.textContent=SALONS.length>0?SALONS.length:"";
  }catch(e){console.error("loadAdminData error:",e);}
}

async function loadDemandes(){
  if(!_adminSb||!_adminIsOnline)return;
  try{
    var r=await _adminSb.from("demandes_essai").select("*").order("created_at",{ascending:false});
    if(r.data)DEMANDES=r.data;
    var badge=document.getElementById("badgeDemandes");
    var nc=DEMANDES.filter(function(d){return d.status==="new";}).length;
    if(badge)badge.textContent=nc>0?nc:"";
  }catch(e){}
}

// ===== NAV & RENDER =====
function nav(page){
  currentPage=page;
  document.querySelectorAll(".sb-item").forEach(function(el){el.classList.remove("active");});
  var items=document.querySelectorAll(".sb-item");
  for(var i=0;i<items.length;i++){
    if(items[i].textContent.toLowerCase().indexOf(page)>-1||items[i].getAttribute("onclick").indexOf(page)>-1)items[i].classList.add("active");
  }
  render();
  document.querySelector(".sidebar").classList.remove("open");
}

function render(){
  var h="";
  switch(currentPage){
    case "dashboard":h=renderDashboard();break;
    case "salons":h=renderSalons();break;
    case "demandes":h=renderDemandes();break;
    case "alerts":h=renderAlerts();break;
    case "revenue":h=renderRevenue();break;
    case "sms":h=renderSMS();break;
    case "settings":h=renderSettings();break;
    case "nf525":h=renderNF525();break;
  }
  document.getElementById("mainContent").innerHTML=h;
  updateOnlineStatus();
}

async function actionSalon(id,action){
  var s=getSalon(id);if(!s)return;
  if(!_adminIsOnline){alert("Mode hors ligne");return;}
  if(action==="suspend"){await _adminSb.from("salons").update({status:"suspended"}).eq("id",id);}
  else if(action==="reactivate"){await _adminSb.from("salons").update({status:"active"}).eq("id",id);}
  else if(action==="extend_trial"){var d=new Date(s.trialEnd||new Date());d.setDate(d.getDate()+7);await _adminSb.from("salons").update({trial_end:d.toISOString()}).eq("id",id);}
  else if(action==="change_plan"){var np=s.plan==="essential"?"pro":"essential";await _adminSb.from("salons").update({plan:np}).eq("id",id);}
  else if(action==="reset_pwd"){await _adminSb.auth.resetPasswordForEmail(s.email);alert("Lien envoy\u00e9 \u00e0 "+s.email);}
  else if(action==="delete"){if(!confirm("ATTENTION : Supprimer d\u00e9finitivement cet \u00e9tablissement et TOUTES ses donn\u00e9es ?"))return;await _adminSb.from("salons").delete().eq("id",id);}
  await loadAdminData();render();closeDetail();if(action!=="reset_pwd")openDetail(id);
}

function generatePassword(){var c="abcdefghjkmnpqrstuvwxyz23456789",p="";for(var i=0;i<8;i++)p+=c.charAt(Math.floor(Math.random()*c.length));return p;}
function closeModal(){document.getElementById("detailOverlay").classList.remove("open");}

async function doCreateSalon(){
  var nom=document.getElementById("newNom").value.trim();
  var ville=document.getElementById("newVille").value.trim();
  var email=document.getElementById("newEmail").value.trim();
  var pass=document.getElementById("newPass").value;
  var tel=document.getElementById("newTel").value.trim();
  var plan=document.getElementById("newPlan").value;
  var status=document.getElementById("newStatus").value;
  var metier=document.getElementById("newMetier").value;

  if(!nom||!email||!pass){var el=document.getElementById("addSalonError");if(el){el.style.display="block";el.textContent="Nom, email et mot de passe obligatoires.";}return;}
  if(pass.length<6){var el=document.getElementById("addSalonError");if(el){el.style.display="block";el.textContent="Mot de passe : 6 caract\u00e8res minimum.";}return;}
  if(!_adminSb||!_adminIsOnline){alert("Non connect\u00e9");return;}

  // 1. Client TEMPORAIRE pour signUp (ne touche pas la session admin)
  var _tempSb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:false,autoRefreshToken:false}});
  var authRes=await _tempSb.auth.signUp({email:email,password:pass,options:{data:{role:"salon"}}});
  if(authRes.error){var el=document.getElementById("addSalonError");if(el){el.style.display="block";el.textContent="Erreur auth: "+authRes.error.message;}return;}
  var newUserId=authRes.data.user.id;

  // 2. Cr\u00e9er le salon en DB (client admin toujours connect\u00e9)
  var trialEnd=status==="trial"?new Date(Date.now()+14*24*60*60*1000).toISOString():null;
  var salonRes=await _adminSb.from("salons").insert({
    user_id:newUserId,nom:nom,ville:ville,email:email,tel:tel,
    plan:plan,status:status,trial_end:trialEnd,metier:metier,
    config_json:JSON.stringify({nom:nom,ville:ville,tel:tel,metier:metier})
  }).select().single();

  if(salonRes.error){var el=document.getElementById("addSalonError");if(el){el.style.display="block";el.textContent="Erreur: "+salonRes.error.message;}return;}

  // 3. Cr\u00e9er collaborateurs par d\u00e9faut
  var newSalonId=salonRes.data.id;
  var clabs={coiffure:["Coiffeur 1","Coiffeur 2"],barbier:["Barbier 1","Barbier 2"],esthetique:["Praticienne 1","Praticienne 2"],ongles:["Proth\u00e9siste 1","Proth\u00e9siste 2"],bien_etre:["Praticien 1","Praticien 2"]};
  var cl=clabs[metier]||clabs.coiffure;
  await _adminSb.from("collaborateurs").insert([
    {salon_id:newSalonId,nom:cl[0],initiales:cl[0].slice(0,2).toUpperCase(),couleur:"#c9a227"},
    {salon_id:newSalonId,nom:cl[1],initiales:cl[1].slice(0,2).toUpperCase(),couleur:"#7d3c98"}
  ]);

  // 4. Log
  await _adminSb.from("admin_log").insert({admin_user_id:_adminUserId,salon_id:newSalonId,action:"CREATE_SALON",details:nom+" - "+plan+" - "+email});

  closeModal();
  alert("\u00c9tablissement \""+nom+"\" cr\u00e9\u00e9 !\n\nIdentifiants :\nEmail : "+email+"\nMot de passe : "+pass+"\n\nCommuniquez ces identifiants au professionnel.");
  await loadAdminData();render();
}

// ===== DEMANDES =====
function renderDemandes(){
  var h='<div class="topbar"><h1>Demandes d\u2019essai<span>'+DEMANDES.length+'</span></h1></div>';
  if(!DEMANDES.length){
    h+='<div class="card" style="text-align:center;padding:40px"><div style="font-size:36px;margin-bottom:12px">\ud83d\udce9</div><div style="color:var(--text3)">Aucune demande. Les demandes du formulaire sur luxyra.fr apparaitront ici.</div></div>';
    return h;
  }
  h+='<div class="table-wrap"><div class="table-header"><div class="table-title">\ud83d\udce9 Depuis le site vitrine</div></div>';
  h+='<div style="overflow-x:auto"><table><tr><th>Date</th><th>\u00c9tablissement</th><th>Contact</th><th>Email</th><th>T\u00e9l</th><th>Ville</th><th>M\u00e9tier</th><th>Plan</th><th>Statut</th><th>Actions</th></tr>';
  DEMANDES.forEach(function(d){
    var dt=d.created_at?new Date(d.created_at).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"\u2014";
    var stColor=d.status==="new"?"var(--gold)":d.status==="contacted"?"var(--blue)":"var(--green)";
    var stLabel=d.status==="new"?"\u2728 Nouveau":d.status==="contacted"?"\ud83d\udcde Contact\u00e9":"\u2705 Trait\u00e9";
    h+='<tr style="'+(d.status==="new"?"font-weight:600":"")+'">';
    h+='<td style="font-size:11px;font-family:var(--mono)">'+dt+'</td>';
    h+='<td>'+((d.nom_salon||d.nom_etablissement)||"\u2014")+'</td>';
    h+='<td>'+(d.nom_contact||"\u2014")+'</td>';
    h+='<td><a href="mailto:'+(d.email||"")+'">'+(d.email||"\u2014")+'</a></td>';
    h+='<td>'+(d.telephone||"\u2014")+'</td>';
    h+='<td>'+(d.ville||"\u2014")+'</td>';
    h+='<td>'+(d.metier||"\u2014")+'</td>';
    h+='<td>'+(d.plan||"\u2014")+'</td>';
    h+='<td><span style="color:'+stColor+';font-size:12px;font-weight:700">'+stLabel+'</span></td>';
    h+='<td><div class="td-actions">';
    if(d.status==="new")h+='<button class="td-btn" onclick="updateDemande(&#39;'+d.id+'&#39;,&#39;contacted&#39;)" title="Contact\u00e9">\ud83d\udcde</button>';
    if(d.status!=="done")h+='<button class="td-btn" onclick="updateDemande(&#39;'+d.id+'&#39;,&#39;done&#39;)" title="Trait\u00e9">\u2705</button>';
    h+='<button class="td-btn" onclick="createFromDemande(&#39;'+d.id+'&#39;)" title="Cr\u00e9er">\u2795</button>';
    h+='</div></td></tr>';
  });
  h+='</table></div></div>';
  return h;
}

async function updateDemande(id,status){
  if(!_adminSb)return;
  await _adminSb.from("demandes_essai").update({status:status}).eq("id",id);
  await loadDemandes();render();
}

function createFromDemande(id){
  var d=DEMANDES.find(function(x){return x.id===id;});if(!d)return;
  addSalonModal();
  setTimeout(function(){
    var el;
    el=document.getElementById("newNom");if(el)el.value=d.nom_salon||d.nom_etablissement||"";
    el=document.getElementById("newVille");if(el)el.value=d.ville||"";
    el=document.getElementById("newEmail");if(el)el.value=d.email||"";
    el=document.getElementById("newTel");if(el)el.value=d.telephone||"";
    if(d.metier){var btn=document.querySelector("[data-metier=\""+d.metier+"\"]");if(btn)pickMetier(btn,d.metier);}
    if(d.plan){el=document.getElementById("newPlan");if(el)el.value=d.plan==="pro"?"pro":"essential";}
  },200);
}

function renderRevenue(){
  var mrr=0;SALONS.forEach(function(s){if(s.status==="active"||s.status==="past_due")mrr+=getPlan(s.plan).prix;});
  var arr=mrr*12;
  var activeSalons=SALONS.filter(function(s){return s.status==="active";}).length;
  var h='<div class="topbar"><h1>Revenus<span>Analyse financi\u00e8re</span></h1></div>';
  h+='<div class="kpi-row">';
  h+='<div class="kpi"><div class="kpi-label">MRR</div><div class="kpi-value" style="color:var(--gold)">'+fmtMoney(mrr)+'</div><div class="kpi-sub">Mensuel</div><div class="kpi-icon">\ud83d\udcb0</div></div>';
  h+='<div class="kpi"><div class="kpi-label">ARR</div><div class="kpi-value" style="color:var(--green)">'+fmtMoney(arr)+'</div><div class="kpi-sub">Projection annuelle</div><div class="kpi-icon">\ud83d\udcc8</div></div>';
  h+='<div class="kpi"><div class="kpi-label">ARPU</div><div class="kpi-value">'+fmtMoney(Math.round(mrr/Math.max(1,activeSalons)*100)/100)+'</div><div class="kpi-sub">Par \u00e9tablissement</div><div class="kpi-icon">\ud83c\udfe0</div></div>';
  h+='</div>';

  h+='<div class="chart-card"><div class="chart-title">\ud83d\udcb0 MRR par plan</div>';
  PLANS.forEach(function(p){
    var rev=0;SALONS.forEach(function(s){if(s.plan===p.id&&s.status!=="suspended")rev+=p.prix;});
    var pct=mrr>0?Math.round(rev/mrr*100):0;
    h+='<div class="chart-bar-row"><div class="chart-bar-label">'+p.nom+' ('+p.prix+'\u20ac)</div>';
    h+='<div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:'+p.couleur+'">'+fmtMoney(rev)+'</div></div>';
    h+='<div class="chart-bar-val">'+pct+'%</div></div>';
  });
  h+='</div>';

  h+='<div class="chart-card"><div class="chart-title">\ud83d\udd2e Simulation croissance</div>';
  h+='<div style="font-size:13px;color:var(--text2);margin-bottom:12px">Si 5 comptes Pro / mois :</div>';
  [{m:"Mois 3",s:15,r:Math.round(15*24.99)},{m:"Mois 6",s:30,r:Math.round(30*24.99)},{m:"Mois 12",s:60,r:Math.round(60*24.99)},{m:"Mois 24",s:120,r:Math.round(120*24.99)}].forEach(function(p){
    var pct=Math.round(p.r/(120*24.99)*100);
    h+='<div class="chart-bar-row"><div class="chart-bar-label">'+p.m+'</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,var(--gold),var(--green))">'+p.s+' \u2192 '+fmtMoney(p.r)+'/mois</div></div></div>';
  });
  h+='</div>';
  return h;
}
