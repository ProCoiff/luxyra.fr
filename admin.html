<style>
:root{
--bg:#06080f;--bg2:#0c0e16;--bg3:#12141e;--bg4:#1a1c28;
--gold:#d4a843;--gold2:#b8960f;--gold-bg:rgba(212,168,67,.08);--gold-bg2:rgba(212,168,67,.15);
--blue:#60a5fa;--green:#4ade80;--red:#f87171;--orange:#fb923c;--purple:#a78bfa;--cyan:#22d3ee;
--red-bg:rgba(248,113,113,.1);--green-bg:rgba(74,222,128,.1);--orange-bg:rgba(251,146,60,.1);--blue-bg:rgba(96,165,250,.1);
--text:#e8edf5;--text2:#94a3b8;--text3:#5a6578;
--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
--f1:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--f1);font-size:14px;line-height:1.5;overflow-x:hidden}
a{color:var(--gold);text-decoration:none}
.sidebar{position:fixed;top:0;left:0;width:250px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:transform .3s}
.sb-logo{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sb-logo img{border-radius:8px}
.sb-logo-text{font-weight:800;font-size:18px}
.sb-logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;color:var(--text3);padding:16px 12px 6px;letter-spacing:1.5px;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;margin-bottom:2px}
.sb-item:hover{background:var(--bg3);color:var(--text)}
.sb-item.active{background:var(--gold-bg);color:var(--gold);font-weight:700}
.sb-item .icon{width:20px;text-align:center;font-size:16px}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:18px;text-align:center}
.sb-footer{padding:16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.main{margin-left:250px;padding:24px;min-height:100vh}
.burger{display:none;position:fixed;top:14px;left:14px;z-index:101;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:18px;cursor:pointer;color:var(--text)}
@media(max-width:900px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:none}.main{margin-left:0;padding:16px;padding-top:60px}.burger{display:block}}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.topbar h1{font-size:22px;font-weight:800}
.topbar h1 span{font-size:13px;font-weight:500;color:var(--text3);margin-left:8px}
.tb-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--f1);transition:all .15s}
.tb-btn:hover{border-color:var(--gold);color:var(--gold)}
.tb-btn.primary{background:var(--gold);color:#0a0a0a;border-color:var(--gold)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden}
.kpi-label{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:800;font-family:var(--mono)}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi-icon{position:absolute;top:14px;right:14px;font-size:28px;opacity:.15}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.table-title{font-weight:700;font-size:15px}
.table-filter{display:flex;gap:4px}
.tf-btn{padding:5px 12px;border-radius:8px;border:none;background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f1)}
.tf-btn.active,.tf-btn:hover{background:var(--gold-bg);color:var(--gold)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:hover{background:rgba(255,255,255,.02)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card h3{font-size:16px;font-weight:700;margin-bottom:12px}
.badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700}
.badge-gold{background:var(--gold-bg);color:var(--gold)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-orange{background:var(--orange-bg);color:var(--orange)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.dp-overlay{position:fixed;inset:0;z-index:200;display:none}
.dp-overlay.open{display:flex}
.dp-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.dp-panel{position:absolute;right:0;top:0;bottom:0;width:480px;max-width:100%;background:var(--bg2);border-left:1px solid var(--border);padding:24px;overflow-y:auto;transform:translateX(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1),width .28s cubic-bezier(.2,.8,.2,1)}
.dp-overlay.open .dp-panel{transform:translateX(0)}
.dp-overlay.fullscreen .dp-panel{width:100%;max-width:100%}
.dp-expand{background:none;border:1px solid var(--border);color:var(--text2);font-size:14px;cursor:pointer;padding:6px 10px;border-radius:8px;margin-right:6px;transition:all .15s}
.dp-expand:hover{border-color:var(--gold);color:var(--gold)}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.dp-close{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:8px}
.dp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.dp-stat{background:var(--bg3);border-radius:10px;padding:12px;text-align:center}
.dp-stat .n{font-size:20px;font-weight:800;font-family:var(--mono)}
.dp-stat .l{font-size:10px;color:var(--text3);margin-top:2px}
.dp-section{margin-bottom:16px}
.dp-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.dp-field{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.dp-field .k{color:var(--text3)}
.dp-field .v{font-weight:600;text-align:right}
.dp-actions{display:flex;flex-wrap:wrap;gap:6px}
.dp-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f1);transition:all .15s}
.dp-btn:hover{border-color:var(--gold);color:var(--gold)}
.dp-btn.success{border-color:var(--green);color:var(--green)}
.dp-btn.danger{border-color:var(--red);color:var(--red)}
.search-box{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px}
.search-box input{flex:1;background:none;border:none;color:var(--text);font-size:14px;outline:none;font-family:var(--f1)}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px}
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px}
.settings-card h3{font-size:15px;font-weight:700;margin-bottom:14px}
.sf-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:10px}
.sf-label{font-weight:600;font-size:13px}
.sf-desc{font-size:11px;color:var(--text3)}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.chart-title{font-weight:700;font-size:15px;margin-bottom:14px}
.chart-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chart-bar-label{width:110px;font-size:12px;color:var(--text2);text-align:right;flex-shrink:0}
.chart-bar-track{flex:1;height:28px;background:var(--bg3);border-radius:8px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:8px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;font-family:var(--mono);transition:width .6s}
.chart-bar-val{width:50px;font-weight:700;font-family:var(--mono);font-size:12px}
.td-salon{display:flex;align-items:center;gap:10px}
.td-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.td-name{font-weight:700;font-size:13px}
.td-city{font-size:11px;color:var(--text3)}
.td-actions{display:flex;gap:4px}
.td-btn{padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:14px;cursor:pointer;transition:all .15s}
.td-btn:hover{background:var(--gold-bg);border-color:var(--gold)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center}
.mbox{max-width:500px;width:calc(100% - 32px);background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;max-height:90vh;overflow-y:auto}
.mbox select option{color:#000;background:#fff}
</style>
</head>

function _b64ToU8(b){b=(b+"=".repeat((4-b.length%4)%4)).replace(/-/g,"+").replace(/_/g,"/");var r=atob(b),a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}

async function lxPushSupported(){return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window;}
async function lxPushEnable(){
  try{
    if(!await lxPushSupported()){alert("Push non supporté sur ce navigateur.");return false;}
    var perm=await Notification.requestPermission();
    if(perm!=="granted"){alert("Permission refusée.");return false;}
    var reg=await navigator.serviceWorker.register("/sw-admin.js",{scope:"/"});
    await navigator.serviceWorker.ready;
    var sub=await reg.pushManager.getSubscription();
    if(!sub){sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:_b64ToU8(VAPID_PUBLIC_KEY)});}
    var j=sub.toJSON();
    var row={admin_user_id:_uid,endpoint:sub.endpoint,p256dh:j.keys.p256dh,auth:j.keys.auth,
      device_label:(navigator.userAgentData&&navigator.userAgentData.platform)||"Navigateur",
      user_agent:navigator.userAgent,events_chat:true,events_inscription:true,events_kbis:true,events_stripe:true,
      last_used_at:new Date().toISOString()};
    await _sb.from("push_subscriptions").upsert(row,{onConflict:"endpoint"});
    if(typeof render==="function")render();
    return true;
  }catch(e){console.error("lxPushEnable",e);alert("Erreur activation push : "+e.message);return false;}
}
async function lxPushDisable(id){
  try{
    if(id){await _sb.from("push_subscriptions").delete().eq("id",id);}
    else{
      var reg=await navigator.serviceWorker.getRegistration("/");
      var sub=reg&&await reg.pushManager.getSubscription();
      if(sub){await _sb.from("push_subscriptions").delete().eq("endpoint",sub.endpoint);await sub.unsubscribe();}
    }
    if(typeof render==="function")render();
  }catch(e){console.error(e);}
}
async function lxPushToggleEvent(id,field,val){

    EV.forEach(function(ev){

// Router 6 onglets v2 — nav(tab, sub) avec ?tab=&sub= et back/forward
// Rétrocompat : anciens nav('dashboard'), nav('inscriptions'), nav('demandes'), nav('sms'), nav('nf525'), nav('settings'), nav('alerts'), nav('revenue'), nav('finances'), nav('systeme')
var LEGACY_NAV={
  dashboard:['cockpit',null], alerts:['cockpit',null],
  inscriptions:['salons','inscriptions'], demandes:['salons','demandes'],
  finances:['finance','revenus'], revenue:['finance','revenus'], nf525:['finance','nf525'],
  sms:['communication','sms'],
  systeme:['parametres','admin'], settings:['parametres','admin']
};
var DEFAULT_SUB={cockpit:null,salons:'liste',finance:'revenus',communication:'chat',analytics:'kpis',parametres:'admin'};
function nav(tab, sub, _fromPop){
  // Rétrocompat 1-arg : si tab est une clé legacy, on remappe
  if(arguments.length===1 && LEGACY_NAV[tab]){var m=LEGACY_NAV[tab];tab=m[0];sub=m[1];}
  if(!tab) tab='cockpit';
  if(typeof sub==='undefined' || sub===null) sub=DEFAULT_SUB[tab]||null;
  window._currentTab=tab; window._currentSub=sub; curPage=sub||tab;
  // URL sync
  if(!_fromPop){
    try{
      var qs='?tab='+encodeURIComponent(tab)+(sub?'&sub='+encodeURIComponent(sub):'');
      history.pushState({tab:tab,sub:sub}, '', qs);
    }catch(e){}
  }
  // Active state sidebar
  document.querySelectorAll('.sb-item').forEach(function(e){
    e.classList.toggle('active', e.getAttribute('data-tab')===tab);
  });
  if(window.innerWidth<900){var sb=document.querySelector('.sidebar');if(sb)sb.classList.remove('open');}
  render();
}
window.addEventListener('popstate', function(e){
  var s=e.state||{};
  var p=new URLSearchParams(location.search);
  nav(s.tab||p.get('tab')||'cockpit', s.sub||p.get('sub')||null, true);
});
function bootRoute(){
  var p=new URLSearchParams(location.search);
  var t=p.get('tab')||'cockpit';
  var s=p.get('sub')||null;
  nav(t, s, true);
  // Replace state pour que back/forward fonctionne dès le premier changement
  try{history.replaceState({tab:t,sub:s}, '', '?tab='+encodeURIComponent(t)+(s?'&sub='+encodeURIComponent(s):''));}catch(e){}
}

// MRR par salon — logique : is_free actif → 0 ; sinon customPrice si non null sinon PLANS[plan].prix
function mrrOf(s){
  if(s.status!=='active'&&s.status!=='past_due')return 0;
  if(s.isFree){
    if(!s.freeUntil)return 0;
    if(new Date(s.freeUntil)>new Date())return 0;
  }
  if(s.customPrice!=null&&s.customPrice!=='')return Number(s.customPrice)||0;
  return gPlan(s.plan).prix||0;
}
function mrrTotal(){var t=0;SALONS.forEach(function(s){t+=mrrOf(s);});return t;}
// MRR rétro 12 mois — pour chaque mois M, on simule "salons existants à fin M qui auraient payé"
function mrr12(){
  var out=[],now=new Date();
  for(var i=11;i>=0;i--){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var endM=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59);
    var t=0;
    SALONS.forEach(function(s){
      if(!s.created)return;
      if(new Date(s.created)>endM)return;
      // Approximation rétro : on applique mrrOf actuel si le salon existait
      t+=mrrOf(s);
    });
    out.push({label:['Jan','Fév','Mar','Avr','Mai','Juin','Jui','Aoû','Sep','Oct','Nov','Déc'][d.getMonth()],value:t});
  }
  return out;
}
// SVG MRR 12 mois — noir/doré, sans Chart.js
function svgMRR(data){
  var W=720,H=200,P=32,n=data.length;
  var max=Math.max.apply(null,data.map(function(d){return d.value;}));max=max||1;
  var bw=(W-P*2)/n*0.7,gap=(W-P*2)/n*0.3;
  var bars='',labels='',values='';
  data.forEach(function(d,i){
    var x=P+i*((W-P*2)/n)+gap/2;
    var bh=(d.value/max)*(H-P*2);
    var y=H-P-bh;
    bars+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+bh+'" rx="3" fill="url(#gold-grad)" opacity="0.85"><title>'+d.label+': '+fmtM(d.value)+'</title></rect>';
    labels+='<text x="'+(x+bw/2)+'" y="'+(H-12)+'" text-anchor="middle" fill="var(--text3)" font-size="10" font-family="var(--mono)">'+d.label+'</text>';
    if(d.value>0)values+='<text x="'+(x+bw/2)+'" y="'+(y-4)+'" text-anchor="middle" fill="var(--gold)" font-size="9" font-family="var(--mono)" font-weight="700">'+Math.round(d.value)+'</text>';
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block"><defs><linearGradient id="gold-grad" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#d4a843"/><stop offset="1" stop-color="#b8960f"/></linearGradient></defs>'+bars+labels+values+'</svg>';
}

window.CHAT_CONVS=[];window.CHAT_ACTIVE=null;window.CHAT_SUB=null;
async function loadChatConvs(){
  if(!_sb||!_online)return;
  try{
    var r=await _sb.from('support_conversations').select('*').order('last_message_at',{ascending:false});
    window.CHAT_CONVS=r.data||[];
    var unread=0;window.CHAT_CONVS.forEach(function(c){unread+=(c.unread_count_admin||0);});
    window.ADMIN_UNREAD_CHAT=unread;
    var b=document.getElementById('badgeChat');if(b)b.textContent=unread||"";
  }catch(e){window.CHAT_CONVS=[];}
}
function rChat(){
  var convs=window.CHAT_CONVS||[];
  var h='<div class="topbar"><h1>Chat support <span>'+convs.length+' conversations</span></h1><button class="tb-btn" onclick="loadChatConvs().then(render)">🔄 Actualiser</button></div>';
  h+='<div style="display:grid;grid-template-columns:320px 1fr;gap:16px;height:calc(100vh - 200px);min-height:500px">';
  // Liste
  h+='<div class="card" style="overflow-y:auto;padding:0">';
  if(convs.length===0)h+='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">Aucune conversation</div>';
  convs.forEach(function(c){
    var s=gSalon(c.salon_id);
    var nom=s?s.nom:'Salon '+(c.salon_id||'').slice(0,8);
    var act=(window.CHAT_ACTIVE===c.id);
    var unread=c.unread_count_admin||0;
    h+='<div onclick="openChatConv(\''+c.id+'\',\''+c.salon_id+'\')" style="padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:'+(act?'var(--gold-bg)':'transparent')+'"><div><div style="font-weight:'+(unread>0?'700':'500')+';font-size:13px">'+nom+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">'+fmtD(c.last_message_at)+'</div></div>'+(unread>0?'<span class="sb-badge">'+unread+'</span>':'')+'</div>';
  });
  h+='</div>';
  // Thread
  h+='<div class="card" style="display:flex;flex-direction:column;padding:0">';
  if(!window.CHAT_ACTIVE){
    h+='<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px">← Sélectionne une conversation</div>';
  }else{
    h+='<div id="chatThread" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px"></div>';
    h+='<div style="border-top:1px solid var(--border);padding:12px;display:flex;gap:8px"><input id="chatInput" placeholder="Réponse..." style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:var(--f1);font-size:13px;outline:none" onkeydown="if(event.keyCode===13)sendChatMsg()"><button class="tb-btn primary" onclick="sendChatMsg()">Envoyer</button></div>';
    setTimeout(loadChatThread,50);
  }
  h+='</div></div>';
  return h;
}
async function openChatConv(convId,salonId){
  window.CHAT_ACTIVE=convId;window.CHAT_ACTIVE_SALON=salonId;
  // Mark all admin-unread as read
  try{
    await _sb.from('support_messages').update({read_by_admin:true}).eq('conversation_id',convId).eq('sender','client');
    await _sb.from('support_conversations').update({unread_count_admin:0}).eq('id',convId);
  }catch(e){}
  await loadChatConvs();render();
}
async function loadChatThread(){
  if(!window.CHAT_ACTIVE)return;
  var el=document.getElementById('chatThread');if(!el)return;
  try{
    var r=await _sb.from('support_messages').select('*').eq('conversation_id',window.CHAT_ACTIVE).order('created_at',{ascending:true});
    var msgs=r.data||[];
    el.innerHTML=msgs.map(function(m){
      var mine=(m.sender==='admin');
      var hh=new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
      var dd=new Date(m.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
      var ticks='';
      if(mine){ticks=' <span style="color:'+(m.read_by_client?'var(--blue,#4fc3f7)':'var(--text3)')+';font-weight:700">'+(m.read_by_client?'✓✓':'✓')+'</span>';}
      return '<div style="align-self:'+(mine?'flex-end':'flex-start')+';max-width:75%;background:'+(mine?'var(--gold-bg2)':'var(--bg3)')+';color:var(--text);padding:8px 12px;border-radius:12px;font-size:13px"><div>'+(m.message||'').replace(/</g,'&lt;')+'</div><div style="font-size:10px;color:var(--text2);margin-top:4px;text-align:right">'+dd+' '+hh+ticks+'</div></div>';
    }).join('');
    el.scrollTop=el.scrollHeight;
  }catch(e){el.innerHTML='<div style="color:var(--red);font-size:12px">Erreur chargement</div>';}
}
async function sendChatMsg(){
  var i=document.getElementById('chatInput');if(!i||!i.value.trim()||!window.CHAT_ACTIVE)return;
  var msg=i.value.trim();i.value='';
  try{
    await _sb.from('support_messages').insert({salon_id:window.CHAT_ACTIVE_SALON,conversation_id:window.CHAT_ACTIVE,sender:'admin',message:msg,read_by_admin:true,read_by_client:false});
    await _sb.from('support_conversations').update({last_message_at:new Date().toISOString(),unread_count_client:1}).eq('id',window.CHAT_ACTIVE);
    loadChatThread();
  }catch(e){alert('Erreur envoi : '+e.message);}
}
function subscribeChatRealtime(){
  if(!_sb||window.CHAT_SUB)return;
  try{
    window.CHAT_SUB=_sb.channel('admin-chat')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'support_messages'},function(p){
        loadChatConvs().then(function(){if(window._currentTab==='communication'&&window._currentSub==='chat'){if(window.CHAT_ACTIVE&&p.new&&p.new.conversation_id===window.CHAT_ACTIVE)loadChatThread();else render();}});
      })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'support_messages'},function(p){
        if(window._currentTab==='communication'&&window._currentSub==='chat'&&window.CHAT_ACTIVE&&p.new&&p.new.conversation_id===window.CHAT_ACTIVE)loadChatThread();
      })
      .subscribe();
  }catch(e){}
}

// === ANALYTICS COHORTES + FUNNEL (Phase 2) ===
function lxAnaCacheGet(k){var c=window.LX_ANA_CACHE||{};var x=c[k];if(!x)return null;if(Date.now()-x.t>300000)return null;return x.v;}
function lxAnaCacheSet(k,v){if(!window.LX_ANA_CACHE)window.LX_ANA_CACHE={};window.LX_ANA_CACHE[k]={t:Date.now(),v:v};}
function lxAnaCacheClear(){window.LX_ANA_CACHE={};render();}

function rAnalyticsCohorts(h){
  var rows=lxAnaCacheGet('cohorts');
  if(!rows){
    var byMonth={};var now=new Date();
    SALONS.forEach(function(s){
      if(!s.created_at)return;
      var d=new Date(s.created_at);if(isNaN(d))return;
      var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      if(!byMonth[k])byMonth[k]={key:k,date:new Date(d.getFullYear(),d.getMonth(),1),inscrits:0,m1:0,m3:0,m6:0};
      byMonth[k].inscrits++;
      var ageMonths=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
      var stillActive=(s.status==='active'||(s.plan&&s.plan!=='trial'&&!s.is_free));
      if(ageMonths>=1&&stillActive)byMonth[k].m1++;
      if(ageMonths>=3&&stillActive)byMonth[k].m3++;
      if(ageMonths>=6&&stillActive)byMonth[k].m6++;
    });
    rows=Object.values(byMonth).sort(function(a,b){return b.date-a.date;}).slice(0,12);
    lxAnaCacheSet('cohorts',rows);
  }
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:12px;color:var(--text3)">Rétention par mois d\'inscription (12 derniers mois)</div><button class="tb-btn" onclick="lxAnaCacheClear()" style="font-size:11px;padding:6px 12px">🔄 Actualiser</button></div>';
  if(!rows.length){h+='<div class="card" style="text-align:center;padding:40px;color:var(--text3)">Pas de données de cohortes (aucun salon avec date d\'inscription)</div>';return h;}
  function pct(n,t){return t>0?Math.round(n*100/t):0;}
  function heat(p){if(p>=70)return 'background:rgba(212,175,55,.45);color:var(--gold)';if(p>=40)return 'background:rgba(212,175,55,.25)';if(p>=15)return 'background:rgba(212,175,55,.12)';return 'background:var(--bg3);color:var(--text3)';}
  h+='<div class="card"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="border-bottom:1px solid var(--border)"><th style="text-align:left;padding:10px 8px;color:var(--text3);font-weight:600">Cohorte</th><th style="text-align:right;padding:10px 8px;color:var(--text3);font-weight:600">Inscrits</th><th style="text-align:center;padding:10px 8px;color:var(--text3);font-weight:600">M+1</th><th style="text-align:center;padding:10px 8px;color:var(--text3);font-weight:600">M+3</th><th style="text-align:center;padding:10px 8px;color:var(--text3);font-weight:600">M+6</th></tr></thead><tbody>';
  var totIns=0,totM1=0,totM3=0,totM6=0;
  rows.forEach(function(r){
    totIns+=r.inscrits;totM1+=r.m1;totM3+=r.m3;totM6+=r.m6;
    var p1=pct(r.m1,r.inscrits),p3=pct(r.m3,r.inscrits),p6=pct(r.m6,r.inscrits);
    var lbl=r.date.toLocaleDateString('fr-FR',{month:'short',year:'numeric'});
    h+='<tr style="border-bottom:1px solid var(--border)"><td style="padding:10px 8px;font-weight:600">'+lbl+'</td><td style="text-align:right;padding:10px 8px;font-family:var(--mono);color:var(--gold)">'+r.inscrits+'</td>';
    h+='<td style="text-align:center;padding:8px"><div style="display:inline-block;padding:6px 12px;border-radius:6px;font-family:var(--mono);font-size:12px;'+heat(p1)+'">'+p1+'%</div></td>';
    h+='<td style="text-align:center;padding:8px"><div style="display:inline-block;padding:6px 12px;border-radius:6px;font-family:var(--mono);font-size:12px;'+heat(p3)+'">'+p3+'%</div></td>';
    h+='<td style="text-align:center;padding:8px"><div style="display:inline-block;padding:6px 12px;border-radius:6px;font-family:var(--mono);font-size:12px;'+heat(p6)+'">'+p6+'%</div></td></tr>';
  });

function rAnalyticsFunnel(h){
  var data=lxAnaCacheGet('funnel');
  if(!data){
    var now=Date.now(),limit90=now-90*86400000;
    var logs=(window.INSCRIPTIONS_LOG||[]).filter(function(l){var d=new Date(l.created_at).getTime();return d>=limit90;});
    var salons90=SALONS.filter(function(s){var d=new Date(s.created_at).getTime();return d>=limit90;});
    var step1=logs.length||salons90.length;
    var step2=logs.filter(function(l){return l.status==='completed'||l.status==='success'||!l.status;}).length||salons90.length;
    var step3=salons90.length;
    var step4=salons90.filter(function(s){return s.plan&&s.plan!=='trial'&&!s.is_free;}).length;
    var limit30=now-30*86400000;
    var step5=salons90.filter(function(s){var d=new Date(s.created_at).getTime();return d<=limit30&&s.plan&&s.plan!=='trial'&&!s.is_free&&s.status==='active';}).length;
    data={steps:[{label:'Inscriptions tentées',n:step1,icon:'📝'},{label:'Inscriptions complétées',n:step2,icon:'✅'},{label:'Essai activé (1er login)',n:step3,icon:'🚀'},{label:'Conversion payante',n:step4,icon:'💳'},{label:'Rétention 30 jours',n:step5,icon:'🏆'}]};
    lxAnaCacheSet('funnel',data);
  }
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:12px;color:var(--text3)">Entonnoir de conversion (90 derniers jours)</div><button class="tb-btn" onclick="lxAnaCacheClear()" style="font-size:11px;padding:6px 12px">🔄 Actualiser</button></div>';
  var top=data.steps[0].n||0;
  if(top<5){h+='<div class="card" style="text-align:center;padding:40px;color:var(--text3)">Pas assez de données pour calculer le funnel<br><span style="font-size:11px">Minimum 5 inscriptions sur les 90 derniers jours requis</span></div>';return h;}
  var convGlobal=top>0?Math.round(data.steps[3].n*100/top):0;
  h+='<div class="kpi-row"><div class="kpi"><div class="kpi-label">Taux conversion global</div><div class="kpi-value" style="color:var(--gold)">'+convGlobal+'%</div><div class="kpi-sub">Inscrits → payants</div></div><div class="kpi"><div class="kpi-label">Coût acquisition virtuel</div><div class="kpi-value" style="color:var(--text3)">—</div><div class="kpi-sub">À connecter Facebook Ads</div></div></div>';
  h+='<div class="card"><h3>🔻 Étapes</h3>';
  data.steps.forEach(function(st,i){
    var w=top>0?Math.round(st.n*100/top):0;
    var prev=i>0?data.steps[i-1].n:st.n;
    var pPrev=prev>0?Math.round(st.n*100/prev):100;
    var pTop=top>0?Math.round(st.n*100/top):0;
    var color=i===0?'var(--gold)':i===data.steps.length-1?'var(--green)':'var(--gold2)';
    h+='<div style="margin:14px 0"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;font-size:13px"><span>'+st.icon+' <strong>'+st.label+'</strong></span><span style="font-family:var(--mono);color:var(--gold)">'+st.n+' <span style="color:var(--text3);font-size:11px">('+pTop+'% du top'+(i>0?' • '+pPrev+'% vs précédent':'')+')</span></span></div><div style="height:24px;background:var(--bg3);border-radius:6px;overflow:hidden;position:relative"><div style="height:100%;width:'+Math.max(w,2)+'%;background:linear-gradient(90deg,var(--gold),'+color+');transition:width .4s"></div></div></div>';
  });
  h+='</div>';
  h+='<div style="font-size:11px;color:var(--text3);margin-top:8px;padding:0 4px">💡 Source : <code>inscriptions_log</code> (90j) + <code>salons</code>. Rétention 30j = salons inscrits il y a ≥30j, plan payant, status active.</div>';
  return h;
}

async function deleteSalonCascade(id){
  // Cascade déterministe Phase 1 — ordre figé enfants → parents.
  // Chaque étape try/catch indépendante pour ne pas bloquer la chaîne.
  if(!_online||!id)return{ok:false,err:"offline"};
  var s=gSalon(id);
  var purged=[],failed=[],steps=[];
  async function step(name,fn){
    try{var r=await fn();if(r&&r.error){failed.push(name+':'+r.error.message);steps.push({name:name,ok:false,err:r.error.message});}
    else{purged.push(name);steps.push({name:name,ok:true});}}
    catch(e){failed.push(name+':'+(e.message||'err'));steps.push({name:name,ok:false,err:e.message||'err'});}
  }
  // 1. support_messages
  await step('support_messages',function(){return _sb.from('support_messages').delete().eq('salon_id',id);});
  // 2. support_conversations
  await step('support_conversations',function(){return _sb.from('support_conversations').delete().eq('salon_id',id);});
  // 3. salon_promotions
  await step('salon_promotions',function(){return _sb.from('salon_promotions').delete().eq('salon_id',id);});
  // 4. salon_admin_notes
  await step('salon_admin_notes',function(){return _sb.from('salon_admin_notes').delete().eq('salon_id',id);});
  // 5. admin_shortcuts (où action_url référence ce salon — best effort, table indexée par admin_user_id)
  // Pas de filtre salon_id sur cette table : on ne purge rien ici, c'est lié à l'admin pas au salon. Skip.
  // 6. cartes_abo_clients
  await step('cartes_abo_clients',function(){return _sb.from('cartes_abo_clients').delete().eq('salon_id',id);});
  // 7. Tables métier (sécurité — appointments, tickets, etc.)
  var metierTables=['appointments','tickets','ticket_lines','cash_movements','z_closures','rdv_online','clients_online','photos_clients','sms_queue','sms_logs','email_logs','cartes_abonnement','cartes_passages','gift_cards','gift_transactions','loyalty_points','forfaits','forfait_phases','absences','horaires','services','produits','stock_movements','webhook_events','nf525_events'];
  for(var i=0;i<metierTables.length;i++){
    var t=metierTables[i];
    await step(t,(function(t){return function(){return _sb.from(t).delete().eq('salon_id',id);};})(t));
  }
  // 8. clients (clients_beautypro)
  await step('clients_beautypro',function(){return _sb.from('clients_beautypro').delete().eq('salon_id',id);});
  await step('clients',function(){return _sb.from('clients').delete().eq('salon_id',id);});
  // 9. collaborateurs
  await step('collaborateurs',function(){return _sb.from('collaborateurs').delete().eq('salon_id',id);});
  // 10. admin_log (entrées du salon)
  await step('admin_log',function(){return _sb.from('admin_log').delete().eq('salon_id',id);});
  // 11. inscriptions_log (par email du salon)
  if(s&&s.email){
    await step('inscriptions_log',function(){return _sb.from('inscriptions_log').delete().eq('email',s.email);});
  }
  // 12. Storage : documents/{id}/*
  try{
    var list=await _sb.storage.from('salon-documents').list('documents/'+id);
    if(list&&list.data&&list.data.length){
      var paths=list.data.map(function(f){return 'documents/'+id+'/'+f.name;});
      var rm=await _sb.storage.from('salon-documents').remove(paths);
      if(rm&&rm.error){failed.push('storage:'+rm.error.message);steps.push({name:'storage',ok:false,err:rm.error.message});}
      else{purged.push('storage('+paths.length+')');steps.push({name:'storage',ok:true,count:paths.length});}
    }else{steps.push({name:'storage',ok:true,count:0});}
  }catch(e){failed.push('storage:'+(e.message||'err'));steps.push({name:'storage',ok:false,err:e.message});}
  // 13. salons (la ligne principale)
  var rs=await _sb.from('salons').delete().eq('id',id);
  if(rs.error)return{ok:false,err:'salons:'+rs.error.message,purged:purged,failed:failed,steps:steps};
  steps.push({name:'salons',ok:true});
  // 14. auth.admin.deleteUser via Worker (service_role côté serveur)
  if(s&&s.userId){
    try{
      var r=await fetch('/api/admin/delete-user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:s.userId})});
      steps.push({name:'auth.deleteUser',ok:r.ok});
      if(!r.ok)failed.push('auth.deleteUser:'+r.status);
    }catch(e){failed.push('auth.deleteUser:'+(e.message||'err'));steps.push({name:'auth.deleteUser',ok:false});}
  }
  // 15. Log final SALON_DELETED_CASCADE
  try{
    await _sb.from('admin_log').insert({admin_user_id:_uid,action:'SALON_DELETED_CASCADE',target_id:id,details:JSON.stringify({nom:s&&s.nom,email:s&&s.email,purged:purged.length,failed:failed.length,steps:steps})});
  }catch(e){}
  return{ok:true,purged:purged,failed:failed,steps:steps};
}

// Wrapper avec double confirmation — appelé depuis la fiche salon
async function confirmDeleteSalon(id){
  var s=gSalon(id);if(!s)return;
  if(!confirm('⚠️ SUPPRESSION DÉFINITIVE\n\nSalon : '+s.nom+'\nEmail : '+(s.email||'?')+'\n\nToutes les données seront purgées (RDV, clients, tickets, documents, compte auth).\n\nContinuer ?'))return;
  var word=prompt('Pour confirmer, tapez exactement le nom du salon :\n\n'+s.nom);
  if(word!==s.nom){alert('❌ Nom incorrect, suppression annulée');return;}
  var res=await deleteSalonCascade(id);
  if(res.ok){
    alert('🗑️ Salon supprimé\n\nÉtapes OK : '+res.purged.length+'\nÉchecs ignorés : '+res.failed.length+(res.failed.length?'\n\nDétails : '+res.failed.slice(0,5).join('\n'):''));
    closeDetail();await loadData();render();
  }else{
    alert('❌ Erreur critique : '+res.err);
  }
}

async function actS(id,act){
  var s=gSalon(id);if(!s||!_online)return;
  if(act==="suspend"){await _sb.from("salons").update({status:"suspended"}).eq("id",id);alert("⛔ Salon suspendu");}
  else if(act==="reactivate"){await _sb.from("salons").update({status:"active"}).eq("id",id);alert("✅ Salon réactivé");}
  else if(act==="extend"){var d=new Date(s.trialEnd||new Date());d.setDate(d.getDate()+7);await _sb.from("salons").update({trial_end:d.toISOString()}).eq("id",id);alert("⏰ Essai prolongé de 7 jours");}
  else if(act==="plan"){var np=s.plan==="essential"?"pro":"essential";if(!confirm("Changer le plan de "+s.nom+" en "+np.toUpperCase()+" ?"))return;await _sb.from("salons").update({plan:np}).eq("id",id);alert("📦 Plan changé en "+np);}
  else if(act==="reset"){await _sb.auth.resetPasswordForEmail(s.email);alert("🔑 Lien de réinitialisation envoyé à "+s.email);return;}
  else if(act==="delete"){await confirmDeleteSalon(id);return;}
  await loadData();render();if(act!=="delete")openD(id);
}

async function updDem(id,st){
  await _sb.from("demandes_essai").update({status:st}).eq("id",id);
  var labels={contacted:"📞 Marqué comme contacté",done:"✅ Marqué comme traité"};
  alert(labels[st]||"Statut mis à jour");
  await loadDemandes();render();
}

async function delDem(id){
  if(!confirm("Supprimer cette demande ?"))return;
  await _sb.from("demandes_essai").delete().eq("id",id);
  await loadDemandes();render();
}

function createFromDem(id){
  var d=DEMANDES.find(function(x){return x.id===id;});if(!d)return;
  addModal();
  setTimeout(function(){
    var el;
    el=document.getElementById("nNom");if(el)el.value=d.nom_salon||d.nom_etablissement||"";
    el=document.getElementById("nCpVille");if(el)el.value=(d.cp?d.cp+" ":"")+(d.ville||"");
    el=document.getElementById("nEmail");if(el)el.value=d.email||"";
    el=document.getElementById("nTel");if(el)el.value=d.telephone||"";
    el=document.getElementById("nGerant");if(el)el.value=d.nom_contact||"";
    if(d.metier){var btn=document.querySelector('[data-m="'+d.metier+'"]');if(btn)pickM(btn,d.metier);}
    if(d.plan){el=document.getElementById("nPlan");if(el)el.value=d.plan==="pro"?"pro":"essential";}
  },200);
}

function rRevenue(){
  var mrr=0;SALONS.forEach(function(s){if((s.status==="active"||s.status==="past_due")&&!s.isFree)mrr+=gPlan(s.plan).prix;});
  var arr=mrr*12;var ac=SALONS.filter(function(s){return s.status==="active";}).length;
  var h='<div class="topbar"><h1>Revenus <span>Analyse financière</span></h1></div>';
  h+='<div class="kpi-row">';
  h+='<div class="kpi"><div class="kpi-label">MRR</div><div class="kpi-value" style="color:var(--gold)">'+fmtM(mrr)+'</div><div class="kpi-sub">Mensuel</div><div class="kpi-icon">💰</div></div>';
  h+='<div class="kpi"><div class="kpi-label">ARR</div><div class="kpi-value" style="color:var(--green)">'+fmtM(arr)+'</div><div class="kpi-sub">Projection annuelle</div><div class="kpi-icon">📈</div></div>';
  h+='<div class="kpi"><div class="kpi-label">ARPU</div><div class="kpi-value">'+fmtM(Math.round(mrr/Math.max(1,ac)*100)/100)+'</div><div class="kpi-sub">Par établissement</div><div class="kpi-icon">🏠</div></div></div>';
  h+='<div class="chart-card"><div class="chart-title">💰 MRR par plan</div>';
  PLANS.forEach(function(p){
    var rev=0;SALONS.forEach(function(s){if(s.plan===p.id&&s.status!=="suspended")rev+=p.prix;});
    var pct=mrr>0?Math.round(rev/mrr*100):0;
    h+='<div class="chart-bar-row"><div class="chart-bar-label">'+p.nom+' ('+p.prix+'€)</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:'+p.couleur+'">'+fmtM(rev)+'</div></div><div class="chart-bar-val">'+pct+'%</div></div>';
  });
  h+='</div>';
  h+='<div class="chart-card"><div class="chart-title">🔮 Simulation croissance</div><div style="font-size:13px;color:var(--text2);margin-bottom:12px">Si 5 comptes Pro / mois :</div>';
  [{m:"Mois 3",s:15,r:Math.round(15*24.99)},{m:"Mois 6",s:30,r:Math.round(30*24.99)},{m:"Mois 12",s:60,r:Math.round(60*24.99)},{m:"Mois 24",s:120,r:Math.round(120*24.99)}].forEach(function(p){
    var pct=Math.round(p.r/2999*100);
    h+='<div class="chart-bar-row"><div class="chart-bar-label">'+p.m+'</div><div class="chart-bar-track"><div class="chart-bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,var(--gold),var(--green))">'+p.s+' → '+fmtM(p.r)+'/mois</div></div></div>';
  });
  h+='</div>';return h;
}

// ===== EDIT LEGAL INFO =====
function editLegal(id){
  var s=gSalon(id);if(!s)return;
  var h='<div class="mbg" onclick="closeMod()"><div class="mbox" onclick="event.stopPropagation()">';
  h+='<div style="display:flex;justify-content:space-between;margin-bottom:20px"><h2 style="font-size:18px">🏢 Informations légales</h2><button onclick="closeMod()" style="background:none;border:none;color:var(--text);font-size:20px;cursor:pointer">✕</button></div>';
  var fs=[["elGerantNom","Nom du gérant",s.gerantNom],["elGerantPrenom","Prénom du gérant",s.gerantPrenom],["elFormeJur","Forme juridique (SARL, SAS, EI, micro...)",s.formeJur],["elSiret","SIRET (14 chiffres)",s.siret],["elSiren","SIREN (9 chiffres)",s.siren],["elTva","N° TVA Intracommunautaire",s.tva],["elAdresse","Adresse",s.adresse],["elCp","Code postal",s.cp],["elVille","Ville",s.ville],["elTel","Téléphone",s.tel]];
  fs.forEach(function(f){
    h+='<div style="margin-bottom:10px"><label style="font-size:11px;color:var(--text2);display:block;margin-bottom:3px">'+f[1]+'</label><input id="'+f[0]+'" value="'+(f[2]||"")+'" style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;outline:none"></div>';
  });
  h+='<button onclick="doSaveLegal(&#39;'+id+'&#39;)" style="width:100%;padding:12px;border-radius:10px;background:var(--gold);color:#000;font-weight:700;font-size:14px;border:none;cursor:pointer">💾 Enregistrer</button>';
  h+='</div></div>';
  document.getElementById("detailOverlay").innerHTML=h;
}

async function doSaveLegal(id){
  if(!_sb||!_online)return;
  var data={
    gerant_nom:document.getElementById("elGerantNom").value.trim(),
    gerant_prenom:document.getElementById("elGerantPrenom").value.trim(),
    forme_juridique:document.getElementById("elFormeJur").value.trim(),
    siret:document.getElementById("elSiret").value.trim(),
    siren:document.getElementById("elSiren").value.trim(),
    tva_intra:document.getElementById("elTva").value.trim(),
    adresse:document.getElementById("elAdresse").value.trim(),
    cp:document.getElementById("elCp").value.trim(),
    ville:document.getElementById("elVille").value.trim(),
    tel:document.getElementById("elTel").value.trim()
  };
  await _sb.from("salons").update(data).eq("id",id);
  await _sb.from("admin_log").insert({admin_user_id:_uid,salon_id:id,action:"EDIT_LEGAL",details:JSON.stringify(data)});
  await loadData();closeMod();render();openD(id);
}

// ===== VERIFICATION =====
async function toggleDocLock(salonId,lock){
  if(!_sb||!_online)return;
  var msg=lock?"\ud83d\udd12 Verrouiller les documents de ce salon ?\n\nLe client ne pourra plus les remplacer tant que vous n'aurez pas d\u00e9verrouill\u00e9.":"\ud83d\udd13 D\u00e9verrouiller les documents ?\n\nLe client pourra les modifier librement.";
  if(!confirm(msg))return;
  var r=await _sb.from("salons").update({documents_locked:lock}).eq("id",salonId);
  if(r&&r.error){alert("Erreur : "+r.error.message);return;}
  await _sb.from("admin_log").insert({admin_user_id:_uid,salon_id:salonId,action:lock?"DOCS_LOCKED":"DOCS_UNLOCKED",details:lock?"Documents verrouill\u00e9s":"Documents d\u00e9verrouill\u00e9s"});
  alert(lock?"\u2705 Documents verrouill\u00e9s":"\ud83d\udd13 Documents d\u00e9verrouill\u00e9s");
  await loadData();render();openD(salonId);
}

async function resetDocs(id){
  if(!confirm("\u26a0 Supprimer TOUS les documents de ce salon ?\n\nLe client devra les renvoyer. Le compte sera bloqu\u00e9 si le d\u00e9lai de 15 jours est d\u00e9pass\u00e9."))return;
  await _sb.from("salons").update({documents_kbis:null,documents_id:null,documents_id_verso:null,verification_status:"pending",verified_at:null,verified_by:null,documents_uploaded_at:null}).eq("id",id);
  await _sb.from("admin_log").insert({admin_user_id:_uid,salon_id:id,action:"DOCS_RESET",details:"Tous les documents supprim\u00e9s"});
  alert("\ud83d\uddd1 Documents r\u00e9initialis\u00e9s");
  await loadData();render();openD(id);
}

async function verifSalon(id,status){
  if(!_sb||!_online)return;
  var labels={verified:"\u2705 Valider les documents (d\u00e9blocage d\u00e9finitif)",pending:"\u23f3 Remettre en attente de v\u00e9rification",incomplete:"\ud83d\udcdd Marquer comme incomplet (le client devra renvoyer)",rejected:"\u274c Rejeter les documents (compte bloqu\u00e9)"};
  if(!confirm((labels[status]||"Changer le statut")+" ?\n\nSalon: "+(gSalon(id)?gSalon(id).nom:id)))return;
  var data={verification_status:status};
  if(status==="verified"){data.verified_at=new Date().toISOString();data.verified_by=_uid;}
  if(status==="pending"||status==="rejected"){data.verified_at=null;data.verified_by=null;}
  await _sb.from("salons").update(data).eq("id",id);
  await _sb.from("admin_log").insert({admin_user_id:_uid,salon_id:id,action:"VERIFY_"+status.toUpperCase(),details:""});
  var msgs={verified:"\u2705 Salon v\u00e9rifi\u00e9 !",pending:"\u23f3 Remis en attente",incomplete:"\ud83d\udcdd Marqu\u00e9 comme incomplet",rejected:"\u274c Salon rejet\u00e9"};
  alert(msgs[status]||"Statut mis \u00e0 jour");
  await loadData();render();openD(id);
}

// ===== EDIT USER ID =====
function editUserId(id){
  var s=gSalon(id);if(!s)return;
  var newId=prompt("User ID actuel :\n"+(s.userId||"aucun")+"\n\nNouveau user_id (UUID auth) :",s.userId||"");
  if(newId===null)return;
  if(newId&&newId.length>30){doEditUserId(id,newId);}
  else{alert("User ID invalide (doit être un UUID)");}
}

async function doEditUserId(id,newUid){
  await _sb.from("salons").update({user_id:newUid}).eq("id",id);
  await _sb.from("admin_log").insert({admin_user_id:_uid,salon_id:id,action:"CHANGE_USER_ID",details:"new="+newUid});
  await loadData();render();openD(id);
}

// ===== SAVE NOTES =====
async function saveNotes(id){
  var n=document.getElementById("dpNotes");if(!n)return;
  await _sb.from("salons").update({notes_admin:n.value}).eq("id",id);
  alert("Notes enregistrées !");
}

async function saveFreePlan(id){
  var isFree=document.getElementById("dpFree").checked;
  var plan=document.getElementById("dpFreePlan").value;
  var dur=document.getElementById("dpFreeDur").value;
  var freeUntil=null;
  if(isFree&&dur!=="unlimited"){
    var d=new Date();
    if(dur==="1m")d.setMonth(d.getMonth()+1);
    else if(dur==="3m")d.setMonth(d.getMonth()+3);
    else if(dur==="6m")d.setMonth(d.getMonth()+6);
    else if(dur==="1y")d.setFullYear(d.getFullYear()+1);
    freeUntil=d.toISOString().slice(0,10);
  }
  var update={is_free:isFree,free_until:freeUntil};
  if(isFree){update.plan=plan;update.status="active";update.trial_end=null;}
  await _sb.from("salons").update(update).eq("id",id);
  var s=gSalon(id);
  if(s){s.isFree=isFree;s.freeUntil=freeUntil;s.plan=isFree?plan:s.plan;s.status=isFree?"active":s.status;}
  alert("\u2705 "+(isFree?"Plan "+plan+" offert"+(freeUntil?" jusqu\u2019au "+fmtD(freeUntil):" (illimit\u00e9)"):"Plan gratuit d\u00e9sactiv\u00e9"));
  openD(id);
}

async function addSmsCredits(id,nb){
  var s=gSalon(id);if(!s)return;
  var newCredits=(s.smsCredits||0)+nb;
  await _sb.from("salons").update({sms_credits:newCredits}).eq("id",id);
  s.smsCredits=newCredits;
  alert("\u2705 "+nb+" SMS ajout\u00e9s. Nouveau solde: "+newCredits+" SMS");
  openD(id);
}

async function addSmsCreditsCustom(id){
  var nb=prompt("Nombre de SMS \u00e0 ajouter :");
  if(!nb||isNaN(nb)||+nb<=0)return;
  await addSmsCredits(id,+nb);
}

async function resetSmsCredits(id){
  if(!confirm("Remettre le solde SMS \u00e0 0 ?"))return;
  var today=new Date().toISOString().slice(0,10);
  await _sb.from("salons").update({sms_credits:0,sms_last_reset:today}).eq("id",id);
  var s=gSalon(id);if(s){s.smsCredits=0;s.smsLastReset=today;}
  alert("\u2705 Solde SMS remis \u00e0 0");
  openD(id);
}
