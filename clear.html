<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Luxyra — Mise à jour</title>
<style>body{background:#0a0a0a;color:#e8e4dc;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{text-align:center;padding:32px;max-width:400px}
h1{color:#d4a843;font-size:24px;margin-bottom:12px}
p{color:#94a3b8;font-size:15px;line-height:1.6}
.ok{color:#4ade80;font-size:20px;font-weight:700;margin-top:20px;display:none}
</style></head><body>
<div class="box">
<div style="font-size:48px;margin-bottom:16px">🔄</div>
<h1>Mise à jour en cours...</h1>
<p id="status">Nettoyage du cache...</p>
<div class="ok" id="done">✅ Terminé ! Redirection...</div>
</div>
<script>
async function clean(){
  var s=document.getElementById("status");
  try{
    // 1. Unregister all service workers
    if(navigator.serviceWorker){
      var regs=await navigator.serviceWorker.getRegistrations();
      for(var i=0;i<regs.length;i++){await regs[i].unregister();}
      s.textContent="Service Workers supprimés ("+regs.length+")...";
    }
    // 2. Delete all caches
    var keys=await caches.keys();
    for(var i=0;i<keys.length;i++){await caches.delete(keys[i]);}
    s.textContent="Caches vidés ("+keys.length+")...";
    // 3. Wait a bit
    await new Promise(function(r){setTimeout(r,500);});
    s.textContent="Redirection...";
    document.getElementById("done").style.display="block";
    // 4. Redirect to app with cache buster
    setTimeout(function(){
      window.location.href="/app.html?_c="+Date.now();
    },800);
  }catch(e){
    s.textContent="Erreur: "+e.message+". Redirection dans 3s...";
    setTimeout(function(){window.location.href="/app.html?_c="+Date.now();},3000);
  }
}
clean();
</script>
</body></html>
